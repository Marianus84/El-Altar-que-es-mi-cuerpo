<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cierre Sagrado - Claridad y Disciplina</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animaciones sutiles y elegantes */
        @keyframes gentle-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
        }
        .animate-gentle-pulse {
            animation: gentle-pulse 2s infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, onSnapshot, collection, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getTodayString = () => {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        };

        const getPreviousDay = (dateStr) => {
            const [y, m, d] = dateStr.split('-');
            const date = new Date(y, m - 1, d);
            date.setDate(date.getDate() - 1);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        };

        const isFriday = (dateStr) => {
            const [y, m, d] = dateStr.split('-');
            const date = new Date(y, m - 1, d);
            return date.getDay() === 5;
        };

        const WISDOM_PHRASES = [
            "Tu cuerpo entra ahora en modo quema de grasa. La magia ocurre en reposo.", // Día 1
            "El hambre nocturna no es emergencia, es solo debilidad abandonando el cuerpo.", // Día 2
            "Respetar el déficit hoy es comprar el físico que disfrutarás mañana.", // Día 3
            "La digestión descansa, permitiendo que tu metabolismo celular se repare.", // Día 4
            "Cada noche en control fortalece tu disciplina como si fuera un músculo.", // Día 5
            "Dormir ligero y con el estómago vacío mejora radicalmente la calidad de tu sueño profundo.", // Día 6
            "Estás enseñando a tu cerebro quién tiene realmente el mando de tus decisiones.", // Día 7 (Semana 1)
            "La grasa almacenada en tu cuerpo es la energía que usarás esta noche.", // Día 8
            "Un cierre limpio hoy garantiza despertar mañana con claridad y energía renovada.", // Día 9
            "La claridad mental de un ayuno nocturno bien llevado no tiene precio.", // Día 10
            "No estás sufriendo, estás esculpiendo tu cuerpo mientras duermes.", // Día 11
            "Ignorar el impulso de comer es el primer paso para dominar tus emociones.", // Día 12
            "Tu sensibilidad a la insulina te agradecerá profundamente este descanso mañana.", // Día 13
            "No es privación, es una inversión directa y segura en tu objetivo principal.", // Día 14 (Semana 2)
            "El reposo digestivo prolongado promueve la autofagia, la longevidad y la salud.", // Día 15
            "Acostarse manteniendo el déficit es el verdadero trabajo duro; el gimnasio es solo el estímulo.", // Día 16
            "Mañana te despertarás más ligero, tanto física como mentalmente.", // Día 17
            "El control nocturno es lo que diferencia a los amateurs de la verdadera élite.", // Día 18
            "En este momento, estás oxidando triglicéridos en lugar de almacenarlos.", // Día 19
            "Tu disciplina inquebrantable al final del día es el pilar de tu éxito a largo plazo.", // Día 20
            "La hormona del crecimiento (HGH) se eleva masivamente en ausencia de picos de insulina nocturnos.", // Día 21 (Semana 3)
            "El verdadero descanso y recuperación comienzan cuando cesa el trabajo de digestión.", // Día 22
            "Cada día cerrado con éxito es un paso gigante e irreversible hacia tu meta.", // Día 23
            "Saborea la sensación del autocontrol; es mucho más dulce que cualquier postre.", // Día 24
            "Tu fuerza de voluntad crece y se solidifica con cada cierre sagrado que respetas.", // Día 25
            "Un déficit calórico respetado es una victoria silenciosa, invisible pero innegable.", // Día 26
            "La inflamación sistémica se reduce cuando el cuerpo no procesa comida extra en la noche.", // Día 27
            "Estás construyendo el entorno hormonal absolutamente perfecto para perder grasa.", // Día 28 (Semana 4)
            "Visualiza tu objetivo final: esta noche de control absoluto te acerca directamente a él.", // Día 29
            "La maestría sobre tus impulsos más primitivos te hace imparable en todos los aspectos de la vida.", // Día 30
            "Eres el arquitecto de tu propio físico, y esta noche, estás dejando que el cemento seque." // Día 31
        ];

        function UnlockSlider({ onUnlock }) {
            const [startX, setStartX] = useState(0);
            const [offset, setOffset] = useState(0);
            const containerRef = useRef(null);
            
            const MAX_DRAG = 220; 
            const THRESHOLD = 200;

            const handleStart = (clientX) => setStartX(clientX);
            const handleMove = (clientX) => {
                if (startX === 0) return;
                const newOffset = clientX - startX;
                if (newOffset > 0 && newOffset <= MAX_DRAG) setOffset(newOffset);
            };
            const handleEnd = () => {
                if (offset >= THRESHOLD) onUnlock();
                else setOffset(0);
                setStartX(0);
            };

            const onTouchStart = (e) => handleStart(e.touches[0].clientX);
            const onTouchMove = (e) => handleMove(e.touches[0].clientX);
            const onTouchEnd = handleEnd;

            const onMouseDown = (e) => handleStart(e.clientX);
            const onMouseMove = (e) => { if(startX > 0) handleMove(e.clientX); };
            const onMouseUp = handleEnd;
            const onMouseLeave = handleEnd;

            return (
                <div className="w-full max-w-[300px] mx-auto mt-12">
                    <div 
                        ref={containerRef}
                        className="bg-white rounded-full h-16 relative overflow-hidden flex items-center border border-slate-200 shadow-inner select-none touch-none"
                        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
                    >
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity" style={{ opacity: startX > 0 ? 0.3 : 1 }}>
                            <span className="text-xs uppercase font-bold tracking-widest text-slate-400">Desliza para reabrir</span>
                        </div>
                        <div className="absolute left-0 top-0 bottom-0 bg-indigo-50 pointer-events-none" style={{ width: `${offset + 32}px` }}></div>
                        <div 
                            className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-md ml-1 z-10 cursor-grab active:cursor-grabbing"
                            style={{ transform: `translateX(${offset}px)`, transition: startX === 0 ? 'transform 0.3s ease-out' : 'none' }}
                        >
                            <i data-lucide="unlock" className="text-white w-5 h-5"></i>
                        </div>
                    </div>
                </div>
            );
        }

        const RITUAL_ACTIONS = [
            { id: 'clean', icon: 'sparkles', title: 'Limpiar y Guardar', desc: 'Cocina limpia. Cero alimentos tentadores a la vista.' },
            { id: 'teeth', icon: 'smile', title: 'Higiene Dental', desc: 'Cepillado profundo. Manda la señal de fin de comida.' },
            { id: 'water', icon: 'cup-soda', title: 'Bebida Final', desc: 'Sirve tu último vaso de agua, té o infusión herbal.' },
            { id: 'lights', icon: 'moon', title: 'Apagar la Cocina', desc: 'Luces fuera. La zona de alimentación entra en reposo.' }
        ];

        function App() {
            const [isClosed, setIsClosed] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [completedActions, setCompletedActions] = useState([]); 
            const [streak, setStreak] = useState(0); 
            
            const todayStr = getTodayString();
            const isTodayFriday = isFriday(todayStr);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            useEffect(() => {
                const setupFirebase = async () => {
                    if (!window.FirebaseSDK) {
                        setTimeout(setupFirebase, 100);
                        return;
                    }

                    const { initializeApp, getFirestore, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseSDK;
                    
                    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
                    const app = initializeApp(firebaseConfig);
                    const firestore = getFirestore(app);
                    const auth = getAuth(app);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'ritual-zen-v1';

                    setDb(firestore);

                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth Error:", error);
                        setIsLoading(false);
                    }

                    onAuthStateChanged(auth, (currUser) => {
                        setUser(currUser);
                        if (currUser) {
                            const { collection, onSnapshot } = window.FirebaseSDK;
                            const ritualsRef = collection(firestore, 'artifacts', appId, 'users', currUser.uid, 'rituals');
                            
                            onSnapshot(ritualsRef, (snapshot) => {
                                const history = {};
                                snapshot.forEach(doc => {
                                    history[doc.id] = doc.data();
                                });

                                if (history[todayStr] && history[todayStr].closed) {
                                    setIsClosed(true);
                                } else {
                                    setIsClosed(false);
                                }

                                // Cálculo de racha incluyendo protección de viernes
                                let currentStreak = 0;
                                let checkDateStr = todayStr;

                                if (history[checkDateStr] && history[checkDateStr].closed) {
                                    currentStreak++;
                                }
                                
                                checkDateStr = getPreviousDay(checkDateStr);
                                
                                while (true) {
                                    const isDayClosed = history[checkDateStr] && history[checkDateStr].closed;
                                    
                                    if (isDayClosed) {
                                        currentStreak++;
                                    } else {
                                        if (!isFriday(checkDateStr)) {
                                            break; // Si no es viernes y falló, se rompe la racha.
                                        }
                                    }
                                    checkDateStr = getPreviousDay(checkDateStr);
                                    if (currentStreak > 5000) break; 
                                }
                                
                                setStreak(currentStreak);
                                setIsLoading(false);

                            }, (err) => {
                                console.error("Error fetching data:", err);
                                setIsLoading(false);
                            });
                        } else {
                            setIsLoading(false);
                        }
                    });
                };
                setupFirebase();
            }, [todayStr]);

            const toggleAction = (id) => {
                if (navigator.vibrate) navigator.vibrate(15);
                if (completedActions.includes(id)) {
                    setCompletedActions(completedActions.filter(a => a !== id));
                } else {
                    setCompletedActions([...completedActions, id]);
                }
            };

            const toggleRitual = async (targetState) => {
                if (!user || !db) return;
                
                if (navigator.vibrate) navigator.vibrate(targetState ? [30, 60, 30] : [100]); 

                const { doc, setDoc } = window.FirebaseSDK;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'ritual-zen-v1';
                
                try {
                    setIsClosed(targetState); 
                    if (!targetState) {
                        setCompletedActions([]);
                    }
                    
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'rituals', todayStr), {
                        closed: targetState,
                        updatedAt: new Date().toISOString()
                    });
                } catch(e) {
                    console.error("Error saving state", e);
                    setIsClosed(!targetState);
                }
            };

            const allActionsCompleted = completedActions.length === RITUAL_ACTIONS.length;
            
            // Calculamos qué frase mostrar basada en la racha (1-31). Si racha = 0, se muestra la primera preventivamente.
            const phraseIndex = Math.max(0, streak - 1) % WISDOM_PHRASES.length;
            const currentWisdom = WISDOM_PHRASES[phraseIndex];

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="w-8 h-8 border-t-2 border-indigo-600 border-solid rounded-full animate-spin"></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen w-full relative">
                    
                    {/* ESTADO 1: PREPARACIÓN DEL RITUAL (Tema Claro) */}
                    <div className={`absolute inset-0 transition-opacity duration-1000 overflow-y-auto pb-20 ${isClosed ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                        
                        {/* Indicador flotante de Racha */}
                        {!isLoading && user && (
                            <div className="absolute top-6 right-6 flex flex-col items-end z-20">
                                <div className="flex items-center gap-1.5 bg-white border border-slate-200 px-4 py-2 rounded-full shadow-sm">
                                    <i data-lucide="flame" className={`w-4 h-4 ${streak > 0 ? 'text-orange-500 fill-orange-500' : 'text-slate-400'}`}></i>
                                    <span className={`font-bold text-sm ${streak > 0 ? 'text-slate-800' : 'text-slate-400'}`}>{streak}</span>
                                </div>
                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 mr-1">Racha Actual</span>
                            </div>
                        )}

                        <div className="max-w-md mx-auto p-6 flex flex-col items-center pt-16">
                            
                            <div className="text-center mb-10">
                                <h2 className="text-[10px] font-bold text-indigo-500 tracking-[0.3em] uppercase mb-3">Paso a paso</h2>
                                <h1 className="text-4xl font-serif font-semibold text-slate-800 tracking-tight leading-none mb-4">
                                    Ritual de Cierre
                                </h1>
                                <p className="text-slate-500 text-sm max-w-[260px] mx-auto leading-relaxed">
                                    Has cumplido tu objetivo calórico de hoy. Prepara tu entorno para el descanso.
                                </p>
                            </div>

                            {/* Aviso de Viernes */}
                            {isTodayFriday && (
                                <div className="w-full bg-emerald-50 border border-emerald-200 rounded-2xl p-4 mb-8 flex items-start gap-3 shadow-sm">
                                    <i data-lucide="shield-check" className="w-5 h-5 text-emerald-500 shrink-0 mt-0.5"></i>
                                    <p className="text-xs text-emerald-700 font-medium leading-relaxed">
                                        Hoy es viernes. Tu racha está protegida. Puedes cerrar la ventana de alimentación o mantenerla abierta sin penalización.
                                    </p>
                                </div>
                            )}

                            {/* Lista de Acciones UI Limpia */}
                            <div className="w-full space-y-3 mb-10">
                                {RITUAL_ACTIONS.map(action => {
                                    const isDone = completedActions.includes(action.id);
                                    return (
                                        <div 
                                            key={action.id}
                                            onClick={() => toggleAction(action.id)}
                                            className={`glass-card p-4 rounded-2xl flex items-center gap-4 cursor-pointer transition-all duration-300 transform active:scale-[0.98] ${
                                                isDone 
                                                ? 'bg-indigo-50/50 border-indigo-200' 
                                                : 'hover:border-slate-300'
                                            }`}
                                        >
                                            <div className={`w-12 h-12 shrink-0 rounded-full flex items-center justify-center border transition-colors duration-300 ${
                                                isDone ? 'border-indigo-500 bg-indigo-500 text-white shadow-md shadow-indigo-200' : 'border-slate-200 bg-slate-100 text-slate-400'
                                            }`}>
                                                {isDone ? <i data-lucide="check" className="w-5 h-5"></i> : <i data-lucide={action.icon} className="w-5 h-5"></i>}
                                            </div>
                                            <div>
                                                <h3 className={`font-semibold text-sm tracking-wide transition-colors duration-300 ${isDone ? 'text-indigo-900 line-through opacity-70' : 'text-slate-800'}`}>
                                                    {action.title}
                                                </h3>
                                                <p className={`text-[11px] leading-relaxed mt-1 transition-colors duration-300 ${isDone ? 'text-indigo-700/60' : 'text-slate-500'}`}>
                                                    {action.desc}
                                                </p>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                            {/* Botón Final */}
                            <button 
                                disabled={!allActionsCompleted}
                                onClick={() => toggleRitual(true)}
                                className={`w-full py-5 rounded-2xl font-bold uppercase tracking-widest transition-all duration-500 flex flex-col items-center justify-center border-2 
                                    ${allActionsCompleted 
                                        ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl shadow-indigo-600/30 hover:bg-indigo-700 hover:scale-[1.02] active:scale-95 animate-gentle-pulse' 
                                        : 'bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed'
                                    }
                                `}
                            >
                                <span className="text-sm">Sellar el Día</span>
                                {!allActionsCompleted && (
                                    <span className="text-[9px] mt-1.5 opacity-60 font-medium tracking-widest">Completa las acciones</span>
                                )}
                            </button>
                        </div>
                    </div>

                    {/* ESTADO 2: CERRADO (Pantalla Zen) */}
                    <div className={`fixed inset-0 bg-slate-50 transition-opacity duration-1000 flex flex-col items-center justify-center p-6 z-50 ${isClosed ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        
                        <div className="absolute inset-0 bg-gradient-to-b from-indigo-50/50 to-slate-100 pointer-events-none"></div>

                        <div className="relative z-10 flex flex-col items-center w-full max-w-sm">
                            
                            <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-6 shadow-sm">
                                <i data-lucide="lock" className="w-7 h-7 text-indigo-600"></i>
                            </div>

                            <h2 className="text-3xl font-serif font-semibold text-slate-800 mb-6 text-center leading-tight">
                                Día Completado
                            </h2>

                            <div className="flex items-center gap-1.5 bg-white border border-slate-200 px-5 py-2.5 rounded-full mb-10 shadow-sm">
                                <i data-lucide="flame" className="w-5 h-5 text-orange-500 fill-orange-500"></i>
                                <span className="text-sm text-slate-700 font-bold">Racha: {streak} días</span>
                            </div>
                            
                            {/* Tarjeta de Sabiduría */}
                            <div className="w-full bg-white border border-indigo-100 rounded-3xl p-8 mb-12 shadow-lg shadow-indigo-900/5 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                                <i data-lucide="quote" className="w-8 h-8 text-indigo-100 mb-4 absolute top-4 right-4"></i>
                                <h3 className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-3">Reflexión del Día {streak || 1}</h3>
                                <p className="text-slate-700 text-[15px] font-serif italic leading-relaxed relative z-10">
                                    "{currentWisdom}"
                                </p>
                            </div>

                            <UnlockSlider onUnlock={() => toggleRitual(false)} />
                        </div>
                        
                        <div className="absolute bottom-8 text-[10px] text-slate-400 font-bold tracking-widest uppercase">
                            Entorno Seguro
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
