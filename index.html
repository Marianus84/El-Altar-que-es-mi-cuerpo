<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altare Integritatis</title>
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
        
        body {
            background-color: #050505;
            color: #d6d3d1;
            font-family: 'Inter', sans-serif;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-altar { font-family: 'Cinzel', serif; }

        /* Animaciones */
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ocultar flechas de input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Resplandores dinámicos por niveles */
        .glow-lv0 { box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
        .glow-lv1 { box-shadow: 0 0 30px rgba(245, 158, 11, 0.2); }
        .glow-lv2 { box-shadow: 0 0 40px rgba(245, 158, 11, 0.3); }
        .glow-lv3 { box-shadow: 0 0 50px rgba(251, 191, 36, 0.4); }
        .glow-lv4 { box-shadow: 0 0 60px rgba(252, 211, 77, 0.5); }
        .glow-lv5 { box-shadow: 0 0 80px rgba(255, 255, 255, 0.4); }
        .glow-lv6 { box-shadow: 0 0 120px rgba(255, 255, 255, 0.7); animation: pure-light 4s infinite alternate; }

        @keyframes pure-light {
            from { filter: brightness(1); }
            to { filter: brightness(1.5); }
        }

        .mantra-box {
            border: 1px solid rgba(217, 119, 6, 0.2);
            background: linear-gradient(to bottom, rgba(217, 119, 6, 0.05), transparent);
        }

        .sub-text {
            font-size: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.5;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isClosed, setIsClosed] = useState(false);
            const [activeTab, setActiveTab] = useState('altar');
            const [history, setHistory] = useState([]);
            
            const [targetWeight, setTargetWeight] = useState(80);
            const [weightHistory, setWeightHistory] = useState([]);
            const [newWeight, setNewWeight] = useState('');
            
            const [showGoals, setShowGoals] = useState(false);
            const fileInputRef = useRef(null);

            const gospels = [
                { verse: "Thermodynamica I:I", text: "Energia neque creatur neque deletur, tantum mutatur. Si altare non clauditur, excessus onus praeteriti fit.", sub: "La energía no se crea ni se destruye, solo se transforma. Si el altar no se cierra, el exceso se convierte en el lastre del pasado." },
                { verse: "Homeostasis IV:XII", text: "Silentium gastricum est nuntius claritatis mentis. In ieiunio, corpus se ipsum sanat.", sub: "El silencio gástrico es el heraldo de la claridad mental. En el ayuno, el cuerpo se cura a sí mismo." },
                { verse: "Insulina II:V", text: "Noli gigantem dormientem extra horam suam excitare. Requies est unica via ad propria deposita comburenda.", sub: "No provoques al gigante dormido fuera de su hora. El reposo es la única vía hacia la quema de tus propios depósitos." }
            ];

            const [ritualSteps, setRitualSteps] = useState([
                { id: 1, text: "Agnoscere necessitatem biologicam expletam esse.", sub: "Reconocer que el requerimiento biológico ha sido satisfecho.", completed: false },
                { id: 2, text: "Munda omnia reliquia alimentorum.", sub: "Limpieza total de los restos del sustento.", completed: false },
                { id: 3, text: "Obsignatio Oris: dentes penitus lavare.", sub: "Sellado Bucal: Lavado profundo de dientes.", completed: false },
                { id: 4, text: "Baptismus ieiunii cum potione vel aqua.", sub: "Bautismo de ayuno con infusión o agua.", completed: false },
                { id: 5, text: "Declarare: 'Lex mea absoluta est usque ad crastinum'.", sub: "Declarar: 'Mi ley es absoluta hasta mañana'.", completed: false }
            ]);

            const levels = [
                { min: 0, name: "Novicius", sub: "Neófito", color: "text-stone-500", glow: "bg-amber-500/10", shadow: "glow-lv0" },
                { min: 3, name: "Custos Legis", sub: "Guardián de la Ley", color: "text-amber-700", glow: "bg-amber-600/20", shadow: "glow-lv1" },
                { min: 7, name: "Templarius Ordinis", sub: "Templario del Orden", color: "text-amber-600", glow: "bg-amber-500/30", shadow: "glow-lv2" },
                { min: 30, name: "Magister Voluntatis", sub: "Maestro de la Voluntad", color: "text-amber-500", glow: "bg-amber-400/40", shadow: "glow-lv3" },
                { min: 90, name: "Ens Lucis", sub: "Ser de Luz", color: "text-amber-300", glow: "bg-amber-200/50", shadow: "glow-lv4" },
                { min: 180, name: "Architectus Fati", sub: "Arquitecto del Destino", color: "text-white", glow: "bg-white/30", shadow: "glow-lv5" },
                { min: 365, name: "Ego Supremus", sub: "El Yo Supremo", color: "text-white brightness-150 font-bold", glow: "bg-white/60 scale-125", shadow: "glow-lv6" }
            ];

            const getCurrentLevel = (streak) => {
                return [...levels].reverse().find(l => streak >= l.min) || levels[0];
            };

            const currentStreak = history.length > 0 ? history[0].streak : 0;
            const currentLevel = getCurrentLevel(currentStreak);

            useEffect(() => {
                loadLocalData();
                if (window.lucide) window.lucide.createIcons();
            }, []);

            const loadLocalData = () => {
                const savedInt = localStorage.getItem('altar_v3_history');
                if (savedInt) {
                    const parsed = JSON.parse(savedInt);
                    setHistory(parsed);
                    const today = new Date().toLocaleDateString();
                    if (parsed[0]?.date === today) setIsClosed(true);
                }

                const savedWeight = localStorage.getItem('altar_weight_data');
                if (savedWeight) {
                    const parsed = JSON.parse(savedWeight);
                    setWeightHistory(parsed.history || []);
                    setTargetWeight(parsed.target || 80);
                }
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, isClosed, ritualSteps, showGoals]);

            const saveWeightData = (hist, target) => {
                localStorage.setItem('altar_weight_data', JSON.stringify({ history: hist, target }));
            };

            const sealTheAltar = () => {
                if (!ritualSteps.every(s => s.completed)) return;
                const today = new Date().toLocaleDateString();
                const newEntry = {
                    date: today,
                    time: new Date().toLocaleTimeString(),
                    streak: history.length > 0 ? (history[0].streak + 1) : 1
                };
                const newHistory = [newEntry, ...history];
                setHistory(newHistory);
                localStorage.setItem('altar_v3_history', JSON.stringify(newHistory));
                setIsClosed(true);
                setActiveTab('altar');
            };

            const exportBackup = () => {
                try {
                    const data = {
                        history: localStorage.getItem('altar_v3_history'),
                        weight: localStorage.getItem('altar_weight_data'),
                        exportDate: new Date().toISOString()
                    };
                    
                    // Usar text/plain para máxima compatibilidad en selectores de archivos móviles
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'text/plain;charset=utf-8' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    
                    const dateStr = new Date().toISOString().split('T')[0];
                    a.href = url;
                    // Algunos móviles prefieren .txt para poder "ver" el archivo
                    a.download = `altare_backup_${dateStr}.json`;
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 150);
                } catch (err) {
                    console.error("Error al exportar:", err);
                }
            };

            const importBackup = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        if (data.history) {
                            const historyValue = typeof data.history === 'string' ? data.history : JSON.stringify(data.history);
                            localStorage.setItem('altar_v3_history', historyValue);
                        }
                        if (data.weight) {
                            const weightValue = typeof data.weight === 'string' ? data.weight : JSON.stringify(data.weight);
                            localStorage.setItem('altar_weight_data', weightValue);
                        }
                        
                        window.location.reload();
                    } catch (err) {
                        console.error("Error importando", err);
                    }
                };
                reader.readAsText(file);
            };

            const addWeightRecord = () => {
                if (!newWeight || isNaN(newWeight)) return;
                const today = new Date().toLocaleDateString();
                const newRecord = { date: today, value: parseFloat(newWeight) };
                const updatedHistory = [...weightHistory, newRecord];
                setWeightHistory(updatedHistory);
                saveWeightData(updatedHistory, targetWeight);
                setNewWeight('');
            };

            const updateTargetWeight = (val) => {
                const t = parseFloat(val);
                setTargetWeight(t);
                saveWeightData(weightHistory, t);
            };

            const currentWeightValue = weightHistory.length > 0 ? weightHistory[weightHistory.length - 1].value : 0;
            const initialWeightValue = weightHistory.length > 0 ? weightHistory[0].value : 0;
            const totalLostValue = initialWeightValue > 0 ? (initialWeightValue - currentWeightValue).toFixed(1) : 0;
            const remainingValue = currentWeightValue > 0 ? (currentWeightValue - targetWeight).toFixed(1) : 0;

            const toggleStep = (id) => {
                setRitualSteps(ritualSteps.map(s => s.id === id ? { ...s, completed: !s.completed } : s));
            };

            const WeightChart = () => {
                if (weightHistory.length < 2) return <div className="h-32 flex flex-col items-center justify-center text-stone-700 italic text-[10px] uppercase tracking-widest">
                    <span>Desunt data ad tramitem...</span>
                    <span className="text-[7px] opacity-50">Faltan datos para trazar la senda...</span>
                </div>;
                
                const values = weightHistory.map(d => d.value);
                const min = Math.min(...values, targetWeight) * 0.98;
                const max = Math.max(...values, targetWeight) * 1.02;
                const range = max - min;
                const width = 400;
                const height = 150;

                const points = weightHistory.map((d, i) => {
                    const x = (i / (weightHistory.length - 1)) * width;
                    const y = height - ((d.value - min) / range) * height;
                    return `${x},${y}`;
                }).join(' ');

                const targetLineY = height - ((targetWeight - min) / range) * height;

                return (
                    <div className="w-full bg-stone-950/20 p-4 border border-stone-900 rounded overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            <line x1="0" y1={targetLineY} x2={width} y2={targetLineY} stroke="#78350f" strokeDasharray="4" strokeWidth="1" />
                            <polyline fill="none" stroke="#d97706" strokeWidth="1.5" points={points} />
                            {weightHistory.map((d, i) => (
                                <circle key={i} cx={(i / (weightHistory.length - 1)) * width} cy={height - ((d.value - min) / range) * height} r="2.5" fill="#d97706" />
                            ))}
                        </svg>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-6 border-b border-stone-900/50 flex justify-between items-center backdrop-blur-xl bg-black/80 sticky top-0 z-50">
                        <div className="flex items-center space-x-2">
                            <Icon name="shield" className="text-amber-600" size={18} />
                            <div className="text-left">
                                <h1 className="text-[10px] font-altar tracking-[0.3em] uppercase text-stone-400">Integritas</h1>
                                <span className="sub-text">Integridad</span>
                            </div>
                        </div>
                        <nav className="flex space-x-4">
                            <button onClick={() => setActiveTab('altar')} className={`text-[10px] tracking-widest uppercase font-bold text-center ${activeTab === 'altar' ? 'text-amber-500' : 'text-stone-600'}`}>
                                <span>Altare</span>
                                <span className="block text-[6px] opacity-50">Altar</span>
                            </button>
                            <button onClick={() => setActiveTab('transmutation')} className={`text-[10px] tracking-widest uppercase font-bold text-center ${activeTab === 'transmutation' ? 'text-amber-500' : 'text-stone-600'}`}>
                                <span>Materia</span>
                                <span className="block text-[6px] opacity-50">Materia</span>
                            </button>
                            <button onClick={() => setActiveTab('identity')} className={`text-[10px] tracking-widest uppercase font-bold text-center ${activeTab === 'identity' ? 'text-amber-500' : 'text-stone-600'}`}>
                                <span>Vota</span>
                                <span className="block text-[6px] opacity-50">Votos</span>
                            </button>
                        </nav>
                    </header>

                    <main className="max-w-md mx-auto px-6 py-10 fade-in">
                        {activeTab === 'altar' && (
                            <div className="flex flex-col items-center space-y-10">
                                <div className="relative text-center">
                                    <div className={`absolute inset-0 rounded-full blur-3xl transition-all duration-1000 ${isClosed ? currentLevel.glow : 'bg-blue-500/5'}`}></div>
                                    <div className={`relative w-40 h-40 rounded-full border flex flex-col items-center justify-center transition-all duration-1000 ${isClosed ? `border-amber-500 ${currentLevel.shadow}` : 'border-stone-800'}`}>
                                        {isClosed ? <Icon name="moon" size={48} className={`${currentLevel.color.split(' ')[0]} animate-pulse`} /> : <Icon name="sun" size={48} className="text-stone-600" />}
                                        <div className="mt-4 flex flex-col items-center">
                                            <span className={`text-[8px] tracking-[0.4em] uppercase font-bold ${isClosed ? currentLevel.color : 'text-stone-500'}`}>
                                                {isClosed ? "Sacratum" : "Vigilia"}
                                            </span>
                                            <span className="text-[6px] opacity-40 uppercase tracking-widest">{isClosed ? "Consagrado" : "Vigilia"}</span>
                                        </div>
                                    </div>
                                    {isClosed && (
                                        <div className="mt-4 animate-bounce flex flex-col items-center">
                                            <span className={`text-[10px] font-altar tracking-widest uppercase ${currentLevel.color}`}>Gradus: {currentLevel.name}</span>
                                            <span className="text-[7px] opacity-60 uppercase tracking-widest">Nivel: {currentLevel.sub}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="text-center space-y-2">
                                    <h2 className="text-3xl font-serif text-stone-200 italic">
                                        {isClosed ? "Lex obsignata est" : "Templum ordinem postulat"}
                                    </h2>
                                    <span className="text-[10px] text-stone-600 uppercase tracking-widest block italic">
                                        {isClosed ? "(la ley ha sido sellada)" : "(el templo reclama orden)"}
                                    </span>
                                    <p className="text-stone-500 text-xs leading-relaxed italic px-4 mt-2">
                                        {isClosed 
                                            ? "Metabolismus tuus in umbra laborat. Verbum tuum unicus limes est." 
                                            : "Desiste ubi limes attingitur. Noli corpus tuum excessibus profanare."}
                                    </p>
                                </div>

                                {!isClosed ? (
                                    <button onClick={() => setActiveTab('ritual')} className="w-full py-4 border border-stone-700 bg-stone-900/50 text-stone-300 font-altar tracking-[0.2em] uppercase text-xs hover:border-amber-500 active:scale-95 transition-all">
                                        <span>Incipere Ritum Clausurae</span>
                                        <span className="block text-[7px] opacity-50 mt-1">Iniciar Ritual de Cierre</span>
                                    </button>
                                ) : (
                                    <div className="flex flex-col items-center space-y-1">
                                        <div className="px-6 py-2 border border-amber-900/50 bg-amber-950/10 text-amber-500 text-[10px] font-bold tracking-[0.3em] uppercase">
                                            Series: {currentStreak} Dies
                                        </div>
                                        <span className="text-[7px] text-amber-700 uppercase tracking-widest">Racha: {currentStreak} Días</span>
                                    </div>
                                )}
                                
                                <div className="mt-8 p-6 border-t border-stone-900 w-full text-center">
                                    <p className="text-[9px] text-amber-600 uppercase tracking-[0.3em] mb-1 font-bold">{gospels[0].verse}</p>
                                    <p className="text-stone-400 font-serif italic text-base">"{gospels[0].text}"</p>
                                    <p className="text-[10px] text-stone-600 italic mt-2">"{gospels[0].sub}"</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ritual' && (
                            <div className="space-y-6">
                                <div className="text-center">
                                    <h2 className="text-xl font-serif text-stone-200">Via Clausurae</h2>
                                    <span className="text-[10px] text-stone-600 uppercase tracking-widest">(El Camino del Cierre)</span>
                                </div>
                                <div className="space-y-3">
                                    {ritualSteps.map(step => (
                                        <div key={step.id} onClick={() => toggleStep(step.id)} className={`p-4 border transition-all ${step.completed ? 'border-amber-900 bg-amber-950/5 text-amber-200' : 'border-stone-900 text-stone-500'}`}>
                                            <div className="flex items-center space-x-4">
                                                <div className={`w-4 h-4 rounded-full border flex-shrink-0 ${step.completed ? 'bg-amber-500 border-amber-500' : 'border-stone-800'}`}></div>
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-serif italic">{step.text}</span>
                                                    <span className="text-[9px] opacity-60 italic">{step.sub}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-6 mantra-box text-center space-y-4 rounded-lg border border-amber-900/30">
                                    <h3 className="text-[10px] font-altar tracking-[0.3em] uppercase text-amber-600 font-bold">Mantra Obsignationis</h3>
                                    <div className="space-y-2">
                                        <p className="text-stone-200 font-altar text-lg leading-relaxed">
                                            "Corpus meum templum meum est,<br/>
                                            voluntas mea lex mea est.<br/>
                                            Fames hesterna robur crastinum est.<br/>
                                            Hunc diem in integritate obsigno.<br/>
                                            Non ducor, duco."
                                        </p>
                                        <div className="pt-2 border-t border-amber-900/20">
                                            <p className="text-stone-600 font-serif italic text-[11px] leading-tight opacity-70">
                                                (Mi cuerpo es mi templo, mi voluntad es mi ley. El hambre de ayer es la fuerza de mañana. Sello este día en integridad. No soy guiado, yo guío.)
                                            </p>
                                        </div>
                                    </div>
                                    <p className="text-[8px] text-stone-700 uppercase tracking-widest italic pt-2">Voce magna recita (Recita en voz alta)</p>
                                </div>

                                <button disabled={!ritualSteps.every(s => s.completed)} onClick={sealTheAltar} className={`w-full py-5 font-altar tracking-widest uppercase text-xs transition-all ${ritualSteps.every(s => s.completed) ? 'bg-amber-600 text-black shadow-[0_0_20px_rgba(217,119,6,0.3)]' : 'bg-stone-900 text-stone-700'}`}>
                                    <span>Obsignare Promissum</span>
                                    <span className="block text-[7px] opacity-50">Sellar Compromiso</span>
                                </button>
                                <button onClick={() => setActiveTab('altar')} className="w-full text-stone-600 text-[10px] uppercase tracking-widest">Reverti (Volver)</button>
                            </div>
                        )}

                        {activeTab === 'transmutation' && (
                            <div className="space-y-8">
                                <div className="text-center">
                                    <h2 className="text-xl font-altar text-stone-200 tracking-widest uppercase">Gubernare Materiam</h2>
                                    <span className="text-[10px] text-stone-600 uppercase tracking-widest">(Gobernar la Materia)</span>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded">
                                        <p className="text-[8px] text-stone-600 uppercase tracking-widest mb-1">Praesens (Actual)</p>
                                        <p className="text-lg font-serif text-stone-200">{currentWeightValue} <span className="text-[10px]">KG</span></p>
                                    </div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded">
                                        <p className="text-[8px] text-stone-600 uppercase tracking-widest mb-1">Meta (Meta)</p>
                                        <p className="text-lg font-serif text-amber-600">{targetWeight} <span className="text-[10px]">KG</span></p>
                                    </div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded">
                                        <p className="text-[8px] text-stone-600 uppercase tracking-widest mb-1">Amissum (Perdido)</p>
                                        <p className="text-lg font-serif text-green-900">-{totalLostValue} <span className="text-[10px]">KG</span></p>
                                    </div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded">
                                        <p className="text-[8px] text-stone-600 uppercase tracking-widest mb-1">Reliquum (Resta)</p>
                                        <p className="text-lg font-serif text-amber-900">{remainingValue} <span className="text-[10px]">KG</span></p>
                                    </div>
                                </div>

                                <WeightChart />

                                <div className="border-b border-stone-800 pb-2 flex items-center justify-between">
                                    <input type="number" value={newWeight} onChange={(e) => setNewWeight(e.target.value)} placeholder="Consignare Pondus (KG)" className="bg-transparent border-none outline-none text-stone-300 w-full font-serif italic text-sm" />
                                    <button onClick={addWeightRecord} className="text-amber-600 text-[9px] font-bold uppercase tracking-widest whitespace-nowrap">
                                        <span>Consignare</span>
                                        <span className="block text-[6px] opacity-50">Registrar</span>
                                    </button>
                                </div>

                                <div className="pt-4 border-t border-stone-900/50">
                                    <button onClick={() => setShowGoals(!showGoals)} className="w-full py-3 flex items-center justify-between text-stone-600 text-[9px] uppercase tracking-[0.2em]">
                                        <div className="text-left">
                                            <span>Regere Metas Sacras</span>
                                            <span className="block text-[7px] opacity-50 italic">Configurar Objetivos Sagrados</span>
                                        </div>
                                        <Icon name={showGoals ? "chevron-up" : "chevron-down"} size={14} />
                                    </button>
                                    <div className={`overflow-hidden transition-all duration-300 ${showGoals ? 'max-h-20 opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
                                        <div className="p-4 bg-stone-900/20 border border-stone-900 rounded">
                                            <p className="text-[8px] text-amber-600 uppercase tracking-widest mb-1 font-bold">Punctum Aequilibrii (Meta KG)</p>
                                            <input type="number" value={targetWeight} onChange={(e) => updateTargetWeight(e.target.value)} className="bg-transparent border-none border-b border-stone-800 outline-none text-stone-300 w-full font-serif text-sm italic py-1" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'identity' && (
                            <div className="space-y-10">
                                <div className="p-6 border border-amber-900/30 bg-amber-950/5 relative overflow-hidden">
                                    <h3 className="text-amber-600 text-[9px] font-bold uppercase tracking-[0.3em] mb-4">Glorĭa et Victōria</h3>
                                    <p className="text-stone-300 font-serif italic text-base leading-relaxed">
                                        "Visualiza tu ascenso. La carpeta <span className="text-amber-500 underline font-bold">Mariano FIT</span> es el testimonio de tu gloria, el resultado de tu disciplina y la prueba de que eres el arquitecto de tu propio destino."
                                    </p>
                                    <a href="https://drive.google.com/drive/folders/1wxD5-44Rj8GVBSCHtKUBf5d12U4K3cOQ?usp=drive_link" target="_blank" className="inline-block mt-4 text-[9px] text-amber-600 uppercase tracking-widest border-b border-amber-600/20">Videre Triumphum (Ver Triunfo)</a>
                                </div>

                                <div className="p-6 border border-red-950/30 bg-red-950/5 relative overflow-hidden">
                                    <h3 className="text-red-900 text-[9px] font-bold uppercase tracking-[0.3em] mb-4">Mementō Morī</h3>
                                    <p className="text-stone-400 font-serif italic text-base leading-relaxed">
                                        "Recuerda la carpeta <span className="text-red-800 underline font-bold">Mariano gordo</span>. Es la advertencia de lo que sucede cuando no hay ley. Tu integridad es tu único escudo contra ese pasado."
                                    </p>
                                    <a href="https://drive.google.com/drive/folders/1wzkDMJnr8cfq36HvbRfRizRLzXdJWDWq" target="_blank" className="inline-block mt-4 text-[9px] text-red-900 uppercase tracking-widest border-b border-red-900/20">Videre Abyssum (Ver Abismo)</a>
                                </div>
                                
                                <div className="space-y-6">
                                    <h4 className="text-amber-600 text-[10px] font-bold uppercase tracking-widest">Praecepta Biologica (Mandamientos)</h4>
                                    <ul className="space-y-4 text-sm text-stone-500 font-serif italic border-l border-stone-900 pl-4">
                                        <li>I. Thermodynamica voluntas suprema est.</li>
                                        <li>II. Fames emotionalis probatio fidei est.</li>
                                        <li>III. Ritus clausurae pactum infragile est.</li>
                                    </ul>
                                </div>

                                <div className="pt-10 border-t border-stone-900 space-y-4">
                                    <h4 className="text-stone-600 text-[10px] font-bold uppercase tracking-widest">Conservatio Progressus (Backup)</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={exportBackup} className="flex flex-col items-center justify-center py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest">
                                            <Icon name="download" size={14} className="mb-1" />
                                            <span>Servare Exemplar</span>
                                            <span className="text-[6px] opacity-40">Guardar Backup</span>
                                        </button>
                                        <button onClick={() => fileInputRef.current.click()} className="flex flex-col items-center justify-center py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest">
                                            <Icon name="upload" size={14} className="mb-1" />
                                            <span>Legere Exemplar</span>
                                            <span className="text-[6px] opacity-40">Cargar Backup</span>
                                        </button>
                                        {/* accept ampliado para mejor detección en móviles */}
                                        <input type="file" ref={fileInputRef} onChange={importBackup} className="hidden" accept=".json,application/json,text/plain,.txt" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full p-6 text-center bg-gradient-to-t from-black to-transparent pointer-events-none">
                        <div className="text-[8px] text-stone-800 uppercase tracking-[0.5em] font-bold font-altar">Non Ducor, Duco</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
