<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALTARE DISCIPLINAE</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');
        
        body {
            background-color: #050505;
            color: #d6d3d1;
            font-family: 'Inter', sans-serif;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            user-select: none;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .font-altar { font-family: 'Cinzel', serif; }

        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .translation-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #d97706;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            color: #d97706;
            letter-spacing: 0.1em;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.3);
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            if (name === 'pencil') {
                return (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                    </svg>
                );
            }
            return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        const movementPatterns = [
            { id: 'SQUAT', lat: 'INFLECTIO', es: 'SENTADILLA' },
            { id: 'LUNGE', lat: 'PROGRESSIO', es: 'ESTOCADA' },
            { id: 'HINGE', lat: 'AXIS', es: 'BISAGRA' },
            { id: 'PUSH', lat: 'PVLSVS', es: 'EMPUJE' },
            { id: 'PULL', lat: 'TRACTVS', es: 'TRACCION' },
            { id: 'CARRY', lat: 'VECTIO', es: 'CARGA' },
            { id: 'ROTATION', lat: 'ROTATIO', es: 'ROTACION' }
        ];

        const muscleList = [
            { id: "HVMERI", label: "HVMERI", es: "HOMBROS" },
            { id: "PECTVS", label: "PECTVS", es: "PECHO" },
            { id: "DORSVM", label: "DORSVM", es: "ESPALDA" },
            { id: "BRACHIA", label: "BRACHIA", es: "BRAZOS" },
            { id: "CORPVS", label: "CORPVS", es: "CORE" },
            { id: "CRVRA", label: "CRVRA", es: "PIERNAS" }
        ];

        const App = () => {
            const [kaizenData, setKaizenData] = useState({
                week: 1,
                history: [],
                exercises: [
                    { name: "ROMANIAN DEADLIFTS", muscles: ["DORSVM", "CRVRA"], pattern: "HINGE", weight: 16, sets: 3, reps: 6, completed: false },
                    { name: "GORILLA ROWS", muscles: ["DORSVM", "BRACHIA"], pattern: "PULL", weight: 16, sets: 3, reps: 10, completed: false },
                    { name: "GOBLET SQVATS", muscles: ["CRVRA", "CORPVS"], pattern: "SQUAT", weight: 16, sets: 3, reps: 6, completed: false },
                    { name: "2 HANDED SWING", muscles: ["CORPVS", "CRVRA", "DORSVM"], pattern: "HINGE", weight: 16, sets: 3, reps: 10, completed: false },
                    { name: "OVERHEAD PRESS", muscles: ["HVMERI", "BRACHIA"], pattern: "PUSH", weight: 16, sets: 3, reps: 8, completed: false },
                    { name: "REVERSE LVNGE", muscles: ["CRVRA"], pattern: "LUNGE", weight: 16, sets: 3, reps: 6, completed: false }
                ]
            });

            const [selectedPatternFilter, setSelectedPatternFilter] = useState('all');
            const [chartFilter, setChartFilter] = useState('all');
            const [isExFormOpen, setIsExFormOpen] = useState(false);
            const [editingExIndex, setEditingExIndex] = useState(null);
            const [tempEx, setTempEx] = useState({ name: '', muscles: [], pattern: '', weight: '', sets: '', reps: '' });
            const [tooltip, setTooltip] = useState({ visible: false, text: '', x: 0, y: 0 });
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const longPressTimer = useRef(null);
            const fileInputRef = useRef(null);

            // Persistence
            useEffect(() => {
                const saved = localStorage.getItem('kaizenData_v2');
                if (saved) setKaizenData(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('kaizenData_v2', JSON.stringify(kaizenData));
                renderKaizenChart();
                if (window.lucide) window.lucide.createIcons();
            }, [kaizenData, chartFilter]);

            // Tooltip Logic
            const handlePressStart = (text, e) => {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                longPressTimer.current = setTimeout(() => {
                    setTooltip({ visible: true, text, x, y: y - 40 });
                }, 500);
            };

            const handlePressEnd = () => {
                clearTimeout(longPressTimer.current);
                setTooltip(prev => ({ ...prev, visible: false }));
            };

            const T = (latin, spanish) => ({
                onPointerDown: (e) => handlePressStart(spanish, e),
                onPointerUp: handlePressEnd,
                onPointerLeave: handlePressEnd,
                className: "cursor-help"
            });

            // Backup Logic
            const exportBackup = () => {
                const data = {
                    kaizen: JSON.stringify(kaizenData),
                    exportDate: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ALTARE_DISCIPLINAE_BACKVP_${new Date().toLocaleDateString()}.json`;
                a.click();
            };

            const importBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.kaizen) {
                            const parsedKaizen = JSON.parse(data.kaizen);
                            setKaizenData(parsedKaizen);
                            localStorage.setItem('kaizenData_v2', data.kaizen);
                        }
                    } catch (err) { console.error("Error importing backup", err); }
                };
                reader.readAsText(file);
            };

            const renderKaizenChart = () => {
                if (!chartRef.current || kaizenData.history.length === 0 || typeof Chart === 'undefined') return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const uniqueWeeks = [...new Set(kaizenData.history.map(h => h.week))].sort((a,b) => a-b);
                const labels = uniqueWeeks.map(w => `EBD ${w}`);
                let names = chartFilter === 'all' ? [...new Set(kaizenData.history.map(h => h.name))] : [chartFilter];
                
                const datasets = names.map((name, index) => ({
                    label: name,
                    data: uniqueWeeks.map(w => kaizenData.history.find(h => h.name === name && h.week === w)?.volume || null),
                    borderColor: ['#d97706', '#78350f', '#f59e0b', '#44403c', '#ffffff', '#22c55e'][index % 6],
                    borderWidth: 2, tension: 0.3, pointRadius: 3, spanGaps: true
                }));

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: chartFilter === 'all', labels: { color: '#a8a29e', font: { size: 9, family: 'Cinzel' } } } },
                        scales: { y: { ticks: { color: '#57534e' }, grid: { color: '#1c1917' } }, x: { ticks: { color: '#57534e' }, grid: { display: false } } }
                    }
                });
            };

            const toggleExComplete = (index) => {
                setKaizenData(prev => ({ ...prev, exercises: prev.exercises.map((ex, i) => i === index ? { ...ex, completed: !ex.completed } : ex) }));
            };

            const applyKaizenCycle = () => {
                setKaizenData(prev => {
                    const newHistory = [...prev.history];
                    prev.exercises.forEach(ex => newHistory.push({ week: prev.week, name: ex.name, weight: ex.weight, sets: ex.sets, reps: ex.reps, volume: ex.weight * ex.sets * ex.reps }));
                    const newExercises = prev.exercises.map(ex => {
                        let reps = ex.reps; let sets = ex.sets;
                        if (reps >= 15) { reps = 8; sets += 1; } else { reps += 1; }
                        return { ...ex, reps, sets, completed: false };
                    });
                    return { ...prev, week: prev.week + 1, history: newHistory, exercises: newExercises };
                });
            };

            const saveNewEx = () => {
                if (!tempEx.name || !tempEx.sets || !tempEx.reps) return;
                const finalEx = { ...tempEx, weight: parseFloat(tempEx.weight) || 0, sets: parseInt(tempEx.sets) || 0, reps: parseInt(tempEx.reps) || 0, completed: false };
                setKaizenData(prev => {
                    const newExs = [...prev.exercises];
                    if (editingExIndex !== null) newExs[editingExIndex] = finalEx;
                    else newExs.push(finalEx);
                    return { ...prev, exercises: newExs };
                });
                setIsExFormOpen(false); setEditingExIndex(null);
            };

            const muscleImpact = useMemo(() => {
                const hits = {};
                kaizenData.exercises.forEach(ex => { if (ex.completed && ex.muscles) ex.muscles.forEach(m => hits[m] = (hits[m] || 0) + 1); });
                return hits;
            }, [kaizenData.exercises]);

            const maxMuscleHits = Math.max(...Object.values(muscleImpact), 0) || 1;

            const filteredExercises = useMemo(() => {
                let filtered = kaizenData.exercises.map((ex, idx) => ({ ...ex, originalIndex: idx }));
                if (selectedPatternFilter !== 'all') filtered = filtered.filter(ex => ex.pattern === selectedPatternFilter);
                return filtered.sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
            }, [kaizenData.exercises, selectedPatternFilter]);

            return (
                <div className="min-h-screen pb-24">
                    {tooltip.visible && <div className="translation-overlay" style={{ left: tooltip.x, top: tooltip.y }}>{tooltip.text}</div>}

                    <header className="p-6 border-b border-stone-900/50 flex items-center justify-between backdrop-blur-xl bg-black/80 sticky top-0 z-50">
                        <div className="flex items-center space-x-3">
                            <Icon name="zap" className="text-amber-600" size={20} />
                            <div>
                                <h1 {...T("DISCIPLINA KAIZEN", "MEJORA CONTINUA")} className="text-xs font-altar tracking-[0.3em] uppercase text-stone-200">DISCIPLINA</h1>
                                <span className="block text-[8px] text-stone-500 tracking-widest uppercase font-bold">KAIZEN MEI</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] font-altar text-amber-600 tracking-widest uppercase">EBDOMADA {kaizenData.week}</span>
                            <span className="block text-[7px] text-stone-600 uppercase font-bold italic">SEMANA {kaizenData.week}</span>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-6 py-8 space-y-10 fade-in">
                        
                        {/* Muscle Impact Section */}
                        <section className="space-y-4">
                            <h2 className="text-[10px] text-stone-500 font-altar tracking-widest uppercase">CORPVS FOCUS</h2>
                            <div className="grid grid-cols-3 gap-2">
                                {muscleList.map(m => {
                                    const hits = muscleImpact[m.id] || 0;
                                    const opacity = hits > 0 ? 0.2 + (hits / maxMuscleHits) * 0.6 : 0;
                                    return (
                                        <div key={m.id} {...T(m.label, m.es)} 
                                            className={`text-center border py-3 text-[9px] font-bold transition-all duration-700 ${hits > 0 ? 'text-stone-200 border-amber-600' : 'text-stone-700 border-stone-900'}`}
                                            style={{ backgroundColor: hits > 0 ? `rgba(217, 119, 6, ${opacity})` : 'transparent' }}>
                                            {m.label}
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* Exercise List Section */}
                        <section className="space-y-6">
                            <div className="flex overflow-x-auto no-scrollbar space-x-2 pb-2">
                                <button onClick={() => setSelectedPatternFilter('all')} className={`flex-shrink-0 px-3 py-1.5 border text-[8px] uppercase tracking-widest font-bold transition-all ${selectedPatternFilter === 'all' ? 'border-amber-600 bg-amber-600 text-black' : 'border-stone-800 text-stone-500'}`}>OMNIA</button>
                                {movementPatterns.map(p => (
                                    <button key={p.id} onClick={() => setSelectedPatternFilter(p.id)} className={`flex-shrink-0 px-3 py-1.5 border text-[8px] uppercase tracking-widest font-bold transition-all ${selectedPatternFilter === p.id ? 'border-amber-600 text-amber-500 bg-amber-950/20' : 'border-stone-800 text-stone-500'}`}>{p.lat}</button>
                                ))}
                            </div>

                            <div className="space-y-3">
                                {filteredExercises.map((ex) => (
                                    <div key={ex.originalIndex} className={`p-4 border transition-all duration-300 ${ex.completed ? 'border-amber-900/40 bg-amber-950/5 opacity-60' : 'border-stone-900 bg-stone-950/20'}`}>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center space-x-4 cursor-pointer flex-1" onClick={() => toggleExComplete(ex.originalIndex)}>
                                                <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${ex.completed ? 'bg-amber-600 border-amber-600' : 'border-stone-700'}`}>
                                                    {ex.completed && <Icon name="check" size={12} className="text-black" />}
                                                </div>
                                                <div className="truncate">
                                                    <h4 className={`text-sm font-serif italic ${ex.completed ? 'text-stone-500' : 'text-stone-300'}`}>{ex.name}</h4>
                                                    <div className="flex space-x-2 mt-1">
                                                        <span className="text-[7px] text-amber-700 uppercase font-bold tracking-tighter">{ex.pattern}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center space-x-4 ml-4">
                                                <div className="text-right">
                                                    <div className="text-[10px] text-stone-300 font-bold uppercase tracking-tighter">{ex.weight} KG</div>
                                                    <div className="text-[8px] text-stone-600 font-bold">{ex.sets}X{ex.reps}</div>
                                                </div>
                                                <button onClick={() => { setTempEx(kaizenData.exercises[ex.originalIndex]); setEditingExIndex(ex.originalIndex); setIsExFormOpen(true); }} className="p-2 bg-stone-900 border border-stone-800 rounded text-stone-500 hover:text-amber-500 transition-all"><Icon name="pencil" size={14} /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button onClick={() => { setEditingExIndex(null); setTempEx({ name: '', muscles: [], pattern: 'SQUAT', weight: '', sets: '', reps: '' }); setIsExFormOpen(true); }} className="w-full py-4 border border-dashed border-stone-800 text-stone-600 text-[9px] font-altar tracking-[0.2em] uppercase hover:text-amber-600 transition-colors">+ ADDE DISCIPLINAM</button>
                        </section>

                        {/* Progression Section */}
                        <section className="space-y-6">
                            <button disabled={!kaizenData.exercises.every(e => e.completed)} onClick={applyKaizenCycle} className={`w-full py-5 font-altar tracking-[0.2em] uppercase text-xs transition-all ${kaizenData.exercises.every(e => e.completed) ? 'bg-amber-600 text-black shadow-lg shadow-amber-900/20 active:scale-95' : 'bg-stone-900 text-stone-700 pointer-events-none opacity-50'}`}>PERFICERE CYCLVM (KAIZEN +1)</button>
                            <div className="h-56 w-full bg-stone-950/20 p-4 border border-stone-900 rounded relative">
                                <div className="absolute top-2 right-4 z-10 flex items-center">
                                    <select onChange={(e) => setChartFilter(e.target.value)} className="bg-transparent border-none text-[8px] text-amber-700 uppercase font-bold outline-none cursor-pointer">
                                        <option value="all" className="bg-black">OMNIA</option>
                                        {[...new Set(kaizenData.history.map(h => h.name))].map(n => <option key={n} value={n} className="bg-black">{n}</option>)}
                                    </select>
                                </div>
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </section>

                        {/* Backup Section Only (Mariano Folders removed) */}
                        <section className="pt-10 border-t border-stone-900 space-y-6">
                            <h4 className="text-stone-600 text-[10px] font-bold uppercase tracking-widest text-center">CONSERVATIO PROGRESSVS</h4>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={exportBackup} className="py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest hover:border-amber-600 transition-colors font-bold">SERVARE EXEMPLAR</button>
                                <button onClick={() => fileInputRef.current.click()} className="py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest hover:border-amber-600 transition-colors font-bold">LEGERE EXEMPLAR</button>
                                <input type="file" ref={fileInputRef} onChange={importBackup} className="hidden" accept=".json" />
                            </div>
                        </section>
                    </main>

                    {/* Modal Logic */}
                    {isExFormOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="w-full max-w-sm p-6 border border-amber-900/50 bg-stone-950 space-y-6 font-bold shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h3 className="text-[10px] font-altar uppercase tracking-widest text-amber-600 border-b border-stone-900 pb-2">{editingExIndex !== null ? "MVTARE EXERCITIVM" : "NOVVM EXERCITIVM"}</h3>
                                <div className="space-y-5">
                                    <div>
                                        <label className="text-[8px] text-stone-600 uppercase block font-bold mb-2">NOMEN</label>
                                        <input value={tempEx.name || ''} onChange={e => setTempEx({...tempEx, name: e.target.value.toUpperCase()})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm italic outline-none uppercase text-stone-200" />
                                    </div>
                                    <div>
                                        <label className="text-[8px] text-stone-600 uppercase block font-bold mb-2">MOTVS FORMA</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {movementPatterns.map(p => (
                                                <button key={p.id} onClick={() => setTempEx({...tempEx, pattern: p.id})} className={`text-[8px] p-2 border transition-all ${tempEx.pattern === p.id ? 'border-amber-600 text-amber-500 bg-amber-950/20' : 'border-stone-800 text-stone-600'} uppercase font-bold`}>{p.lat}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex space-x-4">
                                        <div className="flex-1">
                                            <label className="text-[8px] text-stone-600 uppercase block font-bold mb-1">KG</label>
                                            <input type="number" value={tempEx.weight || ''} onChange={e => setTempEx({...tempEx, weight: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[8px] text-stone-600 uppercase block font-bold mb-1">SERIES</label>
                                            <input type="number" value={tempEx.sets || ''} onChange={e => setTempEx({...tempEx, sets: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[8px] text-stone-600 uppercase block font-bold mb-1">REPS</label>
                                            <input type="number" value={tempEx.reps || ''} onChange={e => setTempEx({...tempEx, reps: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" />
                                        </div>
                                    </div>
                                </div>
                                <div className="pt-6 space-y-3">
                                    <button onClick={saveNewEx} className="w-full py-4 bg-amber-600 text-black font-altar text-[10px] tracking-widest uppercase font-bold">CONSIGNARE</button>
                                    <button onClick={() => setIsExFormOpen(false)} className="w-full text-stone-600 text-[8px] uppercase tracking-widest font-bold">ABROGARE</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 w-full p-6 text-center bg-gradient-to-t from-black via-black/90 to-transparent">
                        <div className="text-[9px] text-stone-800 uppercase tracking-[0.5em] font-bold font-altar italic">NON DVCOR, DVCO</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
