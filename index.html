            const currentStreak = history.length > 0 ? history[0].streak : 0;
            const currentAltarLevel = altarLevels.slice().reverse().find(l => currentStreak >= l.min) || altarLevels[0];

            const proteinStreak = sustentaculumData.historyProtein?.length > 0 ? sustentaculumData.historyProtein[0].streak : 0;
            const stepsLevel = sustLevels.slice().reverse().find(l => stepsStreak >= l.min) || sustLevels[0];
            const proteinLevel = sustLevels.slice().reverse().find(l => proteinStreak >= l.min) || sustLevels[0];

            const timeToGrace = useMemo(() => {
                if (!lastGraceDate) return 0;
                const now = new Date();
                const last = new Date(lastGraceDate);
                
                // Lógica de inicio de semana (Lunes)
                const getMonday = (d) => {
                    const dt = new Date(d);
                    const day = dt.getDay(); // 0 (Dom) a 6 (Sab)
                    const diff = dt.getDate() - day + (day === 0 ? -6 : 1); 
                    return new Date(dt.setDate(diff)).setHours(0, 0, 0, 0);
                };

                const currentMonday = getMonday(now);
                const lastMonday = getMonday(last);

                // Si el lunes actual es posterior al lunes del último uso, está disponible
                if (currentMonday > lastMonday) return 0;

                // Si estamos en la misma semana, calcular días hasta el próximo lunes
                const nextMonday = new Date(currentMonday + 7 * 24 * 60 * 60 * 1000);
                return Math.max(0, Math.ceil((nextMonday - now) / (24 * 60 * 60 * 1000)));
            }, [lastGraceDate]);

            useEffect(() => {
                const savedInt = localStorage.getItem('altar_v3_history');
                let initialHistory = [];
                if (savedInt) {
                    initialHistory = JSON.parse(savedInt);
                    setHistory(initialHistory);
                    if (initialHistory[0]?.date === new Date().toLocaleDateString()) setIsClosed(true);
                }
                const savedWeight = localStorage.getItem('altar_weight_data');
                let initialWeight = { history: [], target: 80 };
                if (savedWeight) {
                    initialWeight = JSON.parse(savedWeight);
                    setWeightHistory(initialWeight.history || []);
                    setTargetWeight(initialWeight.target || 80);
                }
                const savedKaizen = localStorage.getItem('kaizenData');
                if (savedKaizen) setKaizenData(JSON.parse(savedKaizen));
                const savedSust = localStorage.getItem('sustentaculumData');
                let initialSust = sustentaculumData;
                if (savedSust) {
                    initialSust = JSON.parse(savedSust);
                    const today = new Date().toLocaleDateString();
                    if (initialSust.daily.date !== today) {
                        initialSust.daily = { ...initialSust.daily, steps: 0, protein: 0, date: today, stepsSealed: false, proteinSealed: false };
                    }
                    setSustentaculumData(initialSust);
                }
                const savedGrace = localStorage.getItem('altar_grace_date');
                if (savedGrace) setLastGraceDate(savedGrace);

                prevSnapshot.current = JSON.stringify({
                    isClosed: initialHistory[0]?.date === new Date().toLocaleDateString(),
                    history: initialHistory,
                    targetWeight: initialWeight.target,
                    weightHistory: initialWeight.history,
                    kaizenData: savedKaizen ? JSON.parse(savedKaizen) : kaizenData,
                    sustentaculumData: initialSust,
                    lastGraceDate: savedGrace,
                    ritualSteps: ritualSteps
                });
            }, []);

            useEffect(() => {
                const currentSnapshot = JSON.stringify({
                    isClosed, history, targetWeight, weightHistory, kaizenData, sustentaculumData, lastGraceDate, ritualSteps
                });

                if (isUndoing.current) {
                    prevSnapshot.current = currentSnapshot;
                    isUndoing.current = false;
                    return;
                }

                if (prevSnapshot.current && prevSnapshot.current !== currentSnapshot) {
                    setUndoStack(prev => {
                        const newStack = [JSON.parse(prevSnapshot.current), ...prev];
                        return newStack.slice(0, 10);
                    });
                }
                prevSnapshot.current = currentSnapshot;
            }, [isClosed, history, targetWeight, weightHistory, kaizenData, sustentaculumData, lastGraceDate, ritualSteps]);

            useEffect(() => {
                localStorage.setItem('kaizenData', JSON.stringify(kaizenData));
                localStorage.setItem('sustentaculumData', JSON.stringify(sustentaculumData));
                localStorage.setItem('altar_v3_history', JSON.stringify(history));
                localStorage.setItem('altar_weight_data', JSON.stringify({history: weightHistory, target: targetWeight}));
                if (lastGraceDate) localStorage.setItem('altar_grace_date', lastGraceDate);
                else localStorage.removeItem('altar_grace_date');

                if (activeTab === 'disciplina') {
                    const timer = setTimeout(() => renderKaizenChart(), 100);
                    return () => clearTimeout(timer);
                }
                if (activeTab === 'transmutation') {
                    const timer = setTimeout(() => renderWeightChart(), 100);
                    return () => clearTimeout(timer);
                }
                if (window.lucide) {
                    const timer = setTimeout(() => window.lucide.createIcons(), 50);
                    return () => clearTimeout(timer);
                }
            }, [activeTab, isClosed, kaizenData, chartFilter, sustentaculumData, history, weightHistory, targetWeight, lastGraceDate, weightChartFilter]);

            const performUndo = () => {
                if (undoStack.length === 0) return;
                const [lastState, ...remainingStack] = undoStack;
                isUndoing.current = true;
                
                setIsClosed(lastState.isClosed);
                setHistory(lastState.history);
                setTargetWeight(lastState.targetWeight);
                setWeightHistory(lastState.weightHistory);
                setKaizenData(lastState.kaizenData);
                setSustentaculumData(lastState.sustentaculumData);
                setLastGraceDate(lastState.lastGraceDate);
                setRitualSteps(lastState.ritualSteps);
                
                setUndoStack(remainingStack);
            };

            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
            };

            const handleTouchEnd = (e) => {
                if (touchStartX.current === null) return;
                const touchEndX = e.changedTouches[0].clientX;
                const deltaX = touchStartX.current - touchEndX;
                const threshold = 70;
                if (activeTab === 'ritual') return;
                if (Math.abs(deltaX) > threshold) {
                    const currentIndex = TABS_ORDER.indexOf(activeTab);
                    if (deltaX > 0 && currentIndex < TABS_ORDER.length - 1) setActiveTab(TABS_ORDER[currentIndex + 1]);
                    else if (deltaX < 0 && currentIndex > 0) setActiveTab(TABS_ORDER[currentIndex - 1]);
                }
                touchStartX.current = null;
            };

            const renderKaizenChart = () => {
                if (!chartRef.current || kaizenData.history.length === 0 || typeof Chart === 'undefined') return;
                try {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    const uniqueWeeks = [...new Set(kaizenData.history.map(h => h.week))].sort((a,b) => a-b);
                    const labels = uniqueWeeks.map(w => `EBDOMADA ${w}`);
                    let names = chartFilter === 'all' ? [...new Set(kaizenData.history.map(h => h.name))] : [chartFilter];
                    const datasets = names.map((name, index) => ({
                        label: name,
                        data: uniqueWeeks.map(w => kaizenData.history.find(h => h.name === name && h.week === w)?.volume || null),
                        borderColor: ['#d97706', '#78350f', '#f59e0b', '#44403c', '#ffffff', '#22c55e'][index % 6],
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0.3,
                        pointRadius: 4,
                        spanGaps: true
                    }));
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: { labels, datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: chartFilter === 'all', position: 'bottom', labels: { color: '#a8a29e', font: { size: 10, family: 'Cinzel' } } } },
                            scales: { y: { ticks: { color: '#57534e' }, grid: { color: '#1c1917' } }, x: { ticks: { color: '#57534e' }, grid: { display: false } } }
                        }
                    });
                } catch (e) { console.error("CHART ERROR:", e); }
            };

            const renderWeightChart = () => {
                if (!weightChartRef.current || weightHistory.length === 0 || typeof Chart === 'undefined') return;
                try {
                    if (weightChartInstance.current) weightChartInstance.current.destroy();
                    const ctx = weightChartRef.current.getContext('2d');
                    
                    const now = new Date();
                    let filteredHistory = [...weightHistory].sort((a, b) => {
                        const dateA = a.date.split('/').reverse().join('-');
                        const dateB = b.date.split('/').reverse().join('-');
                        return new Date(dateA) - new Date(dateB);
                    });

                    if (weightChartFilter === 'mes') {
                        filteredHistory = filteredHistory.filter(h => {
                            const d = new Date(h.date.split('/').reverse().join('-'));
                            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                        });
                    } else if (weightChartFilter === '3m') {
                        const threeMonthsAgo = new Date();
                        threeMonthsAgo.setMonth(now.getMonth() - 3);
                        filteredHistory = filteredHistory.filter(h => new Date(h.date.split('/').reverse().join('-')) >= threeMonthsAgo);
                    } else if (weightChartFilter === 'year') {
                        filteredHistory = filteredHistory.filter(h => new Date(h.date.split('/').reverse().join('-')).getFullYear() === now.getFullYear());
                    }

                    const labels = filteredHistory.map(h => h.date);
                    const weightData = filteredHistory.map(h => h.value);
                    const targetData = Array(labels.length).fill(targetWeight);

                    weightChartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: 'PONDVS (PESO)',
                                    data: weightData,
                                    borderColor: '#d97706',
                                    backgroundColor: 'rgba(217, 119, 6, 0.1)',
                                    borderWidth: 3,
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 4,
                                    pointBackgroundColor: '#d97706'
                                },
                                {
                                    label: 'VOTVM (META)',
                                    data: targetData,
                                    borderColor: '#44403c',
                                    borderWidth: 2,
                                    borderDash: [5, 5],
                                    pointRadius: 0,
                                    fill: false
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { 
                                y: { 
                                    ticks: { color: '#57534e', font: { size: 9 } }, 
                                    grid: { color: '#1c1917' },
                                    suggestedMin: Math.min(...weightData, targetWeight) - 2,
                                    suggestedMax: Math.max(...weightData, targetWeight) + 2
                                }, 
                                x: { 
                                    ticks: { color: '#57534e', font: { size: 8 }, maxRotation: 45, minRotation: 45 }, 
                                    grid: { display: false } 
                                } 
                            }
                        }
                    });
                } catch (e) { console.error("WEIGHT CHART ERROR:", e); }
            };

            const sealSteps = () => {
                if (sustentaculumData.daily.steps < sustentaculumData.goals.steps || sustentaculumData.daily.stepsSealed) return;
                setSustentaculumData(prev => {
                    const newStreak = prev.historySteps.length > 0 ? prev.historySteps[0].streak + 1 : 1;
                    return { ...prev, daily: { ...prev.daily, stepsSealed: true }, historySteps: [{ date: prev.daily.date, streak: newStreak }, ...prev.historySteps] };
                });
            };

            const sealProtein = () => {
                if (sustentaculumData.daily.protein < sustentaculumData.goals.protein || sustentaculumData.daily.proteinSealed) return;
                setSustentaculumData(prev => {
                    const newStreak = prev.historyProtein.length > 0 ? prev.historyProtein[0].streak + 1 : 1;
                    return { ...prev, daily: { ...prev.daily, proteinSealed: true }, historyProtein: [{ date: prev.daily.date, streak: newStreak }, ...prev.historyProtein] };
                });
            };

            const toggleExComplete = (index) => {
                setKaizenData(prev => ({
                    ...prev,
                    exercises: prev.exercises.map((ex, i) => i === index ? { ...ex, completed: !ex.completed } : ex)
                }));
            };

            const startEditExercise = (index) => {
                setTempEx({ ...kaizenData.exercises[index] });
                setEditingExIndex(index);
                setIsExFormOpen(true);
            };

            const applyKaizenCycle = () => {
                setKaizenData(prev => {
                    const newHistory = [...prev.history];
                    prev.exercises.forEach(ex => newHistory.push({ week: prev.week, name: ex.name, weight: ex.weight, sets: ex.sets, reps: ex.reps, volume: ex.weight * ex.sets * ex.reps }));
                    const newExercises = prev.exercises.map(ex => {
                        let reps = ex.reps;
                        let sets = ex.sets;
                        if (reps >= 15) { reps = 8; sets += 1; } else { reps += 1; }
                        return { ...ex, reps, sets, completed: false };
                    });
                    return { ...prev, week: prev.week + 1, history: newHistory, exercises: newExercises };
                });
            };

            const saveNewEx = () => {
                if (!tempEx.name || !tempEx.sets || !tempEx.reps) return;
                const finalEx = { ...tempEx, weight: parseFloat(tempEx.weight) || 0, sets: parseInt(tempEx.sets) || 0, reps: parseInt(tempEx.reps) || 0, completed: tempEx.completed || false };
                setKaizenData(prev => {
                    const newExs = [...prev.exercises];
                    if (editingExIndex !== null) newExs[editingExIndex] = finalEx;
                    else newExs.push(finalEx);
                    return { ...prev, exercises: newExs };
                });
                setIsExFormOpen(false);
                setEditingExIndex(null);
            };

            const handleGraceDay = () => {
                if (timeToGrace > 0) return;
                const today = new Date().toLocaleDateString();
                const newEntry = { date: today, streak: currentStreak }; 
                const updated = [newEntry, ...history];
                setHistory(updated);
                setLastGraceDate(new Date().toISOString());
                setIsClosed(true);
            };

            const exportBackup = () => {
                const data = {
                    altar: localStorage.getItem('altar_v3_history'),
                    weight: localStorage.getItem('altar_weight_data'),
                    kaizen: localStorage.getItem('kaizenData'),
                    sust: localStorage.getItem('sustentaculumData'),
                    grace: localStorage.getItem('altar_grace_date'),
                    exportDate: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ALTARE_INTEGRITATIS_BACKVP_${new Date().toLocaleDateString()}.json`;
                a.click();
            };

            const importBackup = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.altar) localStorage.setItem('altar_v3_history', data.altar);
                        if (data.weight) localStorage.setItem('altar_weight_data', data.weight);
                        if (data.kaizen) localStorage.setItem('kaizenData', data.kaizen);
                        if (data.sust) localStorage.setItem('sustentaculumData', data.sust);
                        if (data.grace) localStorage.setItem('altar_grace_date', data.grace);
                        window.location.reload();
                    } catch (err) { console.error("ERROREM LEGERE EXEMPLAR", err); }
                };
                reader.readAsText(file);
            };

            const muscleImpact = useMemo(() => {
                const hits = {};
                kaizenData.exercises.forEach(ex => { 
                    if (ex.completed && ex.muscles) {
                        ex.muscles.forEach(m => hits[m] = (hits[m] || 0) + 1); 
                    }
                });
                return hits;
            }, [kaizenData.exercises]);

            const maxHits = Math.max(...Object.values(muscleImpact), 0) || 1;
            const currentWeight = weightHistory.length > 0 ? weightHistory[weightHistory.length - 1].value : 0;
            const lostWeight = weightHistory.length > 0 ? (weightHistory[0].value - currentWeight).toFixed(1) : 0;
            const remainingWeight = currentWeight > 0 ? (currentWeight - targetWeight).toFixed(1) : 0;

            const sortedExercises = useMemo(() => {
                return kaizenData.exercises
                    .map((ex, originalIndex) => ({ ...ex, originalIndex }))
                    .sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
            }, [kaizenData.exercises]);

            return (
                <div className="min-h-screen pb-20" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                    <header className="p-4 border-b border-stone-900/50 flex flex-nowrap items-center backdrop-blur-xl bg-black/80 sticky top-0 z-50 overflow-hidden">
                        <div className="flex items-center space-x-2 flex-shrink-0 mr-4">
                            <Icon name="shield" className="text-amber-600" size={16} />
                            <div className="text-left hidden xs:block">
                                <h1 className="text-[9px] font-altar tracking-[0.2em] uppercase text-stone-400">INTEGRITAS</h1>
                                <span className="block text-[7px] text-stone-500 tracking-widest uppercase mt-0.5 font-bold">INTEGRIDAD</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col items-center justify-center px-4 border-x border-stone-900/30 flex-shrink-0 mr-2">
                            <div className="flex items-center space-x-2">
                                <span className={`text-[9px] font-altar tracking-widest uppercase ${currentAltarLevel.color}`}>{currentAltarLevel.name}</span>
                                <span className="text-stone-700 font-bold">|</span>
                                <span className="text-[10px] font-bold text-amber-500 tracking-tighter">{currentStreak}D</span>
                            </div>
                            <span className="text-[6px] text-stone-500 uppercase tracking-widest font-bold">{currentAltarLevel.sub}</span>
                        </div>

                        <nav className="flex-1 overflow-x-auto no-scrollbar touch-pan-x ml-2 py-1">
                            <div className="flex space-x-6 flex-nowrap min-w-max pr-12">
                                {[
                                    {id: 'altar', lat: 'ALTARE', es: 'ALTAR'},
                                    {id: 'disciplina', lat: 'DISCIPLINA', es: 'KAIZEN'},
                                    {id: 'sustentaculum', lat: 'SVSTENTACVLVM', es: 'SUSTENTO'},
                                    {id: 'transmutation', lat: 'MATERIA', es: 'MATERIA'},
                                    {id: 'identity', lat: 'VOTA', es: 'VOTOS'}
                                ].map(tab => (
                                    <button key={tab.id} 
                                            onClick={() => setActiveTab(tab.id)} 
                                            className={`whitespace-nowrap text-[10px] tracking-widest uppercase font-bold text-center flex-shrink-0 transition-all duration-300 pb-1 border-b-2 ${activeTab === tab.id ? 'text-orange-500 border-orange-500 scale-105' : 'text-stone-600 border-transparent'}`}>
                                        <span className="block">{tab.lat}</span>
                                        <span className="block text-[6px] opacity-50 font-normal">{tab.es}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </header>

                    <main className="max-w-md mx-auto px-6 py-10 fade-in">
                        {activeTab === 'altar' && (
                            <div className="flex flex-col items-center space-y-10">
                                <div className="relative text-center">
                                    <div className={`absolute inset-0 rounded-full blur-3xl transition-all duration-1000 ${isClosed ? currentAltarLevel.glow : 'bg-blue-500/5'}`}></div>
                                    <div className={`relative w-40 h-40 rounded-full border flex flex-col items-center justify-center transition-all duration-1000 ${isClosed ? `border-amber-500 ${currentAltarLevel.shadow}` : 'border-stone-800'}`}>
                                        {isClosed ? (
                                            <Icon name="moon" size={48} className={`${currentAltarLevel.color.split(' ')[0]} animate-pulse`} />
                                        ) : (
                                            <Icon name="shield" size={48} className="text-stone-700" />
                                        )}
                                        <div className="mt-4 flex flex-col items-center">
                                            <span className={`text-[8px] tracking-[0.4em] uppercase font-bold ${isClosed ? currentAltarLevel.color : 'text-stone-500'}`}>
                                                {isClosed ? "SACRATVM" : currentAltarLevel.name}
                                            </span>
                                            <span className="text-[6px] opacity-40 uppercase tracking-widest">
                                                {isClosed ? "CONSAGRADO" : currentAltarLevel.sub}
                                            </span>
                                        </div>
                                    </div>
                                    {isClosed && (
                                        <div className="mt-4 animate-bounce flex flex-col items-center">
                                            <span className={`text-[10px] font-altar tracking-widest uppercase ${currentAltarLevel.color}`}>GRADVS: {currentAltarLevel.name}</span>
                                            <span className="text-[7px] opacity-60 uppercase tracking-widest">NIVEL: {currentAltarLevel.sub}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="text-center space-y-2">
                                    <h2 className="text-3xl font-serif text-stone-200 italic uppercase">{isClosed ? "LEX OBSIGNATA EST" : "TEMPLVM ORDINEM POSTVLAT"}</h2>
                                    <span className="text-[10px] text-stone-600 uppercase tracking-widest block italic">{isClosed ? "(LA LEY HA SIDO SELLADA)" : "(EL TEMPLO RECLAMA ORDEN)"}</span>
                                </div>
                                {!isClosed ? (
                                    <div className="w-full space-y-4">
                                        <button onClick={() => setActiveTab('ritual')} className="w-full py-4 border border-stone-700 bg-stone-900/50 text-stone-300 font-altar tracking-[0.2em] uppercase text-xs hover:border-amber-500 transition-all">
                                            <span>INCIPERE RITVM CLAVSVRAE</span>
                                            <span className="block text-[7px] opacity-50 mt-1 uppercase">INICIAR RITUAL DE CIERRE</span>
                                        </button>
                                        <button 
                                            onClick={handleGraceDay}
                                            disabled={timeToGrace > 0}
                                            className={`w-full py-3 border transition-all flex flex-col items-center justify-center ${timeToGrace > 0 ? 'border-stone-900 bg-stone-950/20 text-stone-800' : 'border-blue-900/40 bg-blue-950/5 text-blue-400 hover:border-blue-500'}`}
                                        >
                                            <span className="text-[10px] font-altar tracking-[0.2em] uppercase font-bold">DIES GRATIAE</span>
                                            <span className="text-[7px] opacity-60 uppercase tracking-widest italic">
                                                {timeToGrace > 0 ? `REQVIES IN ${timeToGrace} DIES` : 'ACTĪVARE INDVLGENTIAM'}
                                            </span>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center space-y-1">
                                        <div className="px-6 py-2 border border-amber-900/50 bg-amber-950/10 text-amber-500 text-[10px] font-bold tracking-[0.3em] uppercase font-altar">SERIES: {currentStreak} DIES</div>
                                        <span className="text-[7px] text-amber-700 uppercase tracking-widest">RACHA: {currentStreak} DIAS</span>
                                    </div>
                                )}
                                <div className="mt-8 p-6 border-t border-stone-900 w-full text-center">
                                    <p className="text-[9px] text-amber-600 uppercase tracking-[0.3em] mb-1 font-bold">{gospels[0].verse}</p>
                                    <p className="text-stone-400 font-serif italic text-base">"{gospels[0].text}"</p>
                                    <p className="text-[10px] text-stone-600 italic mt-2 uppercase">"{gospels[0].sub}"</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'disciplina' && (
                            <div className="space-y-8 fade-in">
                                <div className="text-center">
                                    <h2 className="text-xl font-altar text-stone-200 tracking-[0.2em] uppercase">MELIORATIO KAIZEN</h2>
                                    <div className="text-amber-600 text-[10px] font-bold tracking-widest uppercase mt-1">EBDOMADA {kaizenData.week}</div>
                                    <span className="text-[8px] text-stone-600 uppercase tracking-widest">SEMANA {kaizenData.week}</span>
                                </div>
                                <div className="grid grid-cols-3 gap-1 mb-4">
                                    {muscleList.map(m => {
                                        const hits = muscleImpact[m.id] || 0;
                                        const isActive = hits > 0;
                                        const opacity = isActive ? 0.2 + (hits / maxHits) * 0.6 : 0;
                                        return (
                                            <div key={m.id} 
                                                 className={`text-center border py-2 px-1 text-[9px] font-bold transition-all duration-500 ${isActive ? 'text-stone-200' : 'text-stone-700 border-stone-900'}`}
                                                 style={{ backgroundColor: isActive ? `rgba(217, 119, 6, ${opacity})` : 'transparent', borderColor: isActive ? '#d97706' : '#292524' }}>
                                                {m.label}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="space-y-3">
                                    {sortedExercises.map((ex) => (
                                        <div key={ex.originalIndex} className={`p-4 border transition-all duration-300 ${ex.completed ? 'border-amber-900/40 bg-amber-950/5 opacity-60' : 'border-stone-900 bg-stone-950/20'}`}>
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-3 cursor-pointer overflow-hidden flex-1" onClick={() => toggleExComplete(ex.originalIndex)}>
                                                    <div className={`w-4 h-4 rounded-full border flex-shrink-0 flex items-center justify-center transition-colors ${ex.completed ? 'bg-amber-600 border-amber-600' : 'border-stone-700'}`}>
                                                        {ex.completed && <Icon name="check" size={10} className="text-black" />}
                                                    </div>
                                                    <div className="truncate">
                                                        <h4 className={`text-sm font-serif italic truncate ${ex.completed ? 'text-stone-500' : 'text-stone-300'}`}>{ex.name}</h4>
                                                        <span className="text-[8px] text-amber-600/60 uppercase tracking-widest font-bold">{ex.muscles?.join(', ')}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center space-x-4 flex-shrink-0 ml-2">
                                                    <div className="text-right text-[10px] text-stone-500 uppercase tracking-tighter font-bold">{ex.weight}KG — {ex.sets}X{ex.reps}</div>
                                                    <button onClick={(e) => { e.stopPropagation(); startEditExercise(ex.originalIndex); }} className="p-2 bg-stone-900 border border-stone-800 rounded text-stone-400 hover:text-amber-500 hover:border-amber-500 transition-all flex items-center justify-center">
                                                        <Icon name="pencil" size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { setEditingExIndex(null); setTempEx({ name: '', muscles: [], weight: '', sets: '', reps: '' }); setIsExFormOpen(true); }} className="w-full py-4 border border-stone-800 text-stone-500 text-[10px] font-altar tracking-widest uppercase hover:text-amber-600 transition-colors">+ ADDE DISCIPLINAM</button>
                                <button disabled={!kaizenData.exercises.every(e => e.completed)} onClick={applyKaizenCycle} className={`w-full py-5 font-altar tracking-[0.2em] uppercase text-xs transition-all ${kaizenData.exercises.every(e => e.completed) ? 'bg-amber-600 text-black shadow-lg shadow-amber-900/20' : 'bg-stone-900 text-stone-700 pointer-events-none opacity-50'}`}>PERFICERE CYCLVM (KAIZEN +1)</button>
                                <div className="h-48 w-full bg-stone-950/20 p-2 border border-stone-900 rounded"><canvas ref={chartRef}></canvas></div>
                            </div>
                        )}

                        {activeTab === 'sustentaculum' && (
                            <div className="space-y-8 fade-in">
                                <div className="text-center">
                                    <h2 className="text-xl font-altar text-stone-200 tracking-[0.2em] uppercase">SVSTENTACVLVM BIOLOGICVM</h2>
                                    <span className="text-[10px] text-stone-600 uppercase tracking-widest">SUSTENTO BIOLOGICO</span>
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="flex flex-col items-center space-y-4">
                                        <div className={`flex flex-col items-center space-y-3 transition-all duration-700 ${sustentaculumData.daily.steps >= sustentaculumData.goals.steps ? 'glow-success' : ''}`}>
                                            <div className="relative w-24 h-24 flex items-center justify-center">
                                                <svg className="absolute inset-0 w-full h-full -rotate-90">
                                                    <circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="2" fill="transparent" className="text-stone-900" />
                                                    <circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="3" fill="transparent" strokeDasharray={251.2} strokeDashoffset={251.2 - (Math.min(sustentaculumData.daily.steps / sustentaculumData.goals.steps, 1) * 251.2)} className={`${sustentaculumData.daily.steps >= sustentaculumData.goals.steps ? 'text-amber-500' : 'text-stone-600'} transition-all duration-1000`} />
                                                </svg>
                                                <div className="text-center z-10"><Icon name="footprints" className={`${sustentaculumData.daily.steps >= sustentaculumData.goals.steps ? 'text-amber-500' : 'text-stone-700'} mx-auto`} size={16} /></div>
                                            </div>
                                            <div className="text-center">
                                                <span className="text-[8px] text-stone-600 uppercase tracking-widest font-bold">PASSVS</span>
                                                <input type="number" disabled={sustentaculumData.daily.stepsSealed} value={sustentaculumData.daily.steps || ''} onChange={e => setSustentaculumData(prev => ({...prev, daily: {...prev.daily, steps: parseFloat(e.target.value) || 0}}))} className="block w-20 bg-transparent border-b border-stone-800 text-center text-xs outline-none mt-1 disabled:opacity-50" />
                                            </div>
                                        </div>
                                        {!sustentaculumData.daily.stepsSealed ? (<button onClick={sealSteps} disabled={sustentaculumData.daily.steps < sustentaculumData.goals.steps} className={`w-full py-2 border font-altar tracking-widest uppercase text-[8px] transition-all ${sustentaculumData.daily.steps >= sustentaculumData.goals.steps ? 'bg-amber-600/20 text-amber-500 border-amber-600' : 'bg-stone-900/50 border-stone-800 text-stone-700'}`}>OBSIGNARE PASSVS</button>) : (<div className="text-center flex flex-col items-center">
                                            <span className={`text-[8px] font-altar uppercase tracking-widest ${stepsLevel.color}`}>{stepsLevel.name}</span>
                                            <span className="text-[6px] text-stone-500 uppercase tracking-widest font-bold mb-1 opacity-70">{stepsLevel.sub}</span>
                                            <span className="text-[6px] text-stone-600 uppercase tracking-widest font-bold">SERIES: {stepsStreak}</span>
                                        </div>)}
                                    </div>
                                    <div className="flex flex-col items-center space-y-4">
                                        <div className={`flex flex-col items-center space-y-3 transition-all duration-700 ${sustentaculumData.daily.protein >= sustentaculumData.goals.protein ? 'glow-success' : ''}`}>
                                            <div className="relative w-24 h-24 flex items-center justify-center">
                                                <svg className="absolute inset-0 w-full h-full -rotate-90">
                                                    <circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="2" fill="transparent" className="text-stone-900" />
                                                    <circle cx="48" cy="48" r="40" stroke="currentColor" strokeWidth="3" fill="transparent" strokeDasharray={251.2} strokeDashoffset={251.2 - (Math.min(sustentaculumData.daily.protein / sustentaculumData.goals.protein, 1) * 251.2)} className={`${sustentaculumData.daily.protein >= sustentaculumData.goals.protein ? 'text-stone-200' : 'text-stone-700'} transition-all duration-1000`} />
                                                </svg>
                                                <div className="text-center z-10"><Icon name="zap" className={`${sustentaculumData.daily.protein >= sustentaculumData.goals.protein ? 'text-white' : 'text-stone-800'} mx-auto`} size={16} /></div>
                                            </div>
                                            <div className="text-center">
                                                <span className="text-[8px] text-stone-600 uppercase tracking-widest font-bold">PROTEINA</span>
                                                <input type="number" disabled={sustentaculumData.daily.proteinSealed} value={sustentaculumData.daily.protein || ''} onChange={e => setSustentaculumData(prev => ({...prev, daily: { ...prev.daily, protein: parseFloat(e.target.value) || 0 }}))} className="block w-20 bg-transparent border-b border-stone-800 text-center text-xs outline-none mt-1 disabled:opacity-50" />
                                            </div>
                                        </div>
                                        {!sustentaculumData.daily.proteinSealed ? (<button onClick={sealProtein} disabled={sustentaculumData.daily.protein < sustentaculumData.goals.protein} className={`w-full py-2 border font-altar tracking-widest uppercase text-[8px] transition-all ${sustentaculumData.daily.protein >= sustentaculumData.goals.protein ? 'bg-stone-200/20 text-white border-white' : 'bg-stone-900/50 border-stone-800 text-stone-700'}`}>OBSIGNARE PROTEINAM</button>) : (<div className="text-center flex flex-col items-center">
                                            <span className={`text-[8px] font-altar uppercase tracking-widest ${proteinLevel.color}`}>{proteinLevel.name}</span>
                                            <span className="text-[6px] text-stone-500 uppercase tracking-widest font-bold mb-1 opacity-70">{proteinLevel.sub}</span>
                                            <span className="text-[6px] text-stone-600 uppercase tracking-widest font-bold">SERIES: {proteinStreak}</span>
                                        </div>)}
                                    </div>
                                </div>
                                <div className="p-6 border border-stone-900 bg-stone-950/20 text-center italic font-serif text-xs text-stone-500 uppercase font-bold tracking-wider leading-relaxed">"PASSVS PER PASSVM, MVNITIO CORPORIS TVI. PROTEINA EST LATERIS TVI TEMPLI."</div>
                                <div className="pt-4 border-t border-stone-900/50">
                                    <button onClick={() => setShowSustGoals(!showSustGoals)} className="w-full py-3 flex items-center justify-between text-stone-600 text-[9px] uppercase tracking-[0.2em] font-bold"><span>METAS SACRAS</span><Icon name={showSustGoals ? "chevron-up" : "chevron-down"} size={14} /></button>
                                    <div className={`overflow-hidden transition-all duration-300 ${showSustGoals ? 'max-h-64 opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
                                        <div className="grid grid-cols-2 gap-4 p-4 bg-stone-900/20 border border-stone-900 rounded">
                                            <div><label className="text-[8px] text-amber-600 uppercase tracking-widest block font-bold mb-1">META PASSVS</label><input type="number" value={sustentaculumData.goals.steps} onChange={e => setSustentaculumData(prev => ({...prev, goals: {...prev.goals, steps: parseFloat(e.target.value) || 0}}))} className="bg-transparent border-b border-stone-800 outline-none text-stone-300 w-full font-serif text-xs py-1" /></div>
                                            <div><label className="text-[8px] text-stone-400 uppercase tracking-widest block font-bold mb-1">META PROTEINAM</label><input type="number" value={sustentaculumData.goals.protein} onChange={e => setSustentaculumData(prev => ({...prev, goals: {...prev.goals, protein: parseFloat(e.target.value) || 0}}))} className="bg-transparent border-b border-stone-800 outline-none text-stone-300 w-full font-serif text-xs py-1" /></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'transmutation' && (
                            <div className="space-y-8 fade-in">
                                <div className="text-center"><h2 className="text-xl font-altar text-stone-200 tracking-widest uppercase">GVBERNARE MATERIAM</h2><span className="text-[10px] text-stone-600 uppercase tracking-widest">(GOBERNAR LA MATERIA)</span></div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded font-bold"><p className="text-[8px] text-stone-600 uppercase tracking-widest mb-1">PRAESENS</p><p className="text-lg font-serif text-stone-200">{currentWeight} KG</p></div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded font-bold"><p className="text-lg font-serif text-amber-600">{targetWeight} KG</p><p className="text-[8px] text-stone-600 uppercase tracking-widest mt-1">META</p></div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded font-bold"><p className="text-lg font-serif text-green-900">-{lostWeight} KG</p><p className="text-[8px] text-stone-600 uppercase tracking-widest mt-1">AMISSVM</p></div>
                                    <div className="p-4 border border-stone-900 bg-stone-950/30 text-center rounded font-bold"><p className="text-lg font-serif text-amber-900">{remainingWeight} KG</p><p className="text-[8px] text-stone-600 uppercase tracking-widest mt-1">RELIQVVM</p></div>
                                </div>
                                <div className="border-b border-stone-800 pb-2 flex items-center justify-between">
                                    <input type="number" value={newWeight} onChange={(e) => setNewWeight(e.target.value)} placeholder="CONSIGNARE PONDVS (KG)" className="bg-transparent border-none outline-none text-stone-300 w-full font-serif italic text-sm uppercase" />
                                    <button onClick={() => { if(!newWeight) return; const updated = [...weightHistory, {date: new Date().toLocaleDateString(), value: parseFloat(newWeight)}]; setWeightHistory(updated); setNewWeight(''); }} className="text-amber-600 text-[9px] font-bold uppercase tracking-widest">CONSIGNARE</button>
                                </div>

                                {/* WEIGHT CHART SECTION */}
                                <div className="space-y-4">
                                    <div className="flex justify-center space-x-2">
                                        {['mes', '3m', 'year'].map(f => (
                                            <button 
                                                key={f} 
                                                onClick={() => setWeightChartFilter(f)}
                                                className={`px-3 py-1 text-[8px] uppercase tracking-widest border transition-all ${weightChartFilter === f ? 'border-amber-600 text-amber-500 bg-amber-950/10' : 'border-stone-900 text-stone-600 hover:text-stone-400'}`}
                                            >
                                                {f === 'mes' ? 'Mensis' : f === '3m' ? 'III menses' : 'Annvs'}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="h-56 w-full bg-stone-950/20 p-2 border border-stone-900 rounded relative">
                                        <canvas ref={weightChartRef}></canvas>
                                    </div>
                                </div>

                                <div className="pt-4 border-t border-stone-900/50">
                                    <button onClick={() => setShowWeightGoal(!showWeightGoal)} className="w-full py-3 flex items-center justify-between text-stone-600 text-[9px] uppercase tracking-[0.2em] font-bold"><span>METAE CORPORIS</span><Icon name={showWeightGoal ? "chevron-up" : "chevron-down"} size={14} /></button>
                                    <div className={`overflow-hidden transition-all duration-300 ${showWeightGoal ? 'max-h-32 opacity-100 mt-4' : 'max-h-0 opacity-0'}`}>
                                        <div className="p-4 bg-stone-900/20 border border-stone-900 rounded">
                                            <label className="text-[8px] text-amber-600 uppercase tracking-widest block font-bold mb-1">META PONDVS (KG)</label>
                                            <input type="number" value={targetWeight} onChange={e => setTargetWeight(parseFloat(e.target.value) || 0)} className="bg-transparent border-b border-stone-800 outline-none text-stone-300 w-full font-serif text-xs py-1" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ritual' && (
                            <div className="space-y-6 fade-in">
                                <div className="text-center"><h2 className="text-xl font-serif text-stone-200 uppercase">VIA CLAVSVRAE</h2></div>
                                <div className="space-y-3 font-bold">{ritualSteps.map(step => (
                                    <div key={step.id} onClick={() => setRitualSteps(ritualSteps.map(s => s.id === step.id ? {...s, completed: !s.completed} : s))} className={`p-4 border transition-all duration-300 ${step.completed ? 'border-amber-900 bg-amber-950/10 text-amber-200' : 'border-stone-900 text-stone-500 bg-stone-950/20'}`}>
                                        <div className="flex items-center space-x-4">
                                            <div className={`w-4 h-4 rounded-full border transition-colors ${step.completed ? 'bg-amber-500 border-amber-500' : 'border-stone-800'}`}></div>
                                            <div><span className="text-sm font-serif italic">{step.text}</span><span className="text-[9px] opacity-60 block italic uppercase mt-0.5">{step.sub}</span></div>
                                        </div>
                                    </div>
                                ))}</div>
                                <button disabled={!ritualSteps.every(s => s.completed)} onClick={() => {
                                    const newEntry = {date: new Date().toLocaleDateString(), streak: history.length > 0 ? history[0].streak + 1 : 1};
                                    setHistory([newEntry, ...history]); 
                                    setIsClosed(true); 
                                    setActiveTab('altar');
                                    setRitualSteps(prev => prev.map(s => ({...s, completed: false})));
                                }} className={`w-full py-5 font-altar tracking-widest uppercase text-xs transition-all ${ritualSteps.every(s => s.completed) ? 'bg-amber-600 text-black shadow-lg shadow-amber-900/30' : 'bg-stone-900 text-stone-700 pointer-events-none'}`}>OBSIGNARE PROMISSVM</button>
                            </div>
                        )}

                        {activeTab === 'identity' && (
                            <div className="space-y-10 fade-in">
                                <div className="p-6 border border-amber-900/30 bg-amber-950/5 relative overflow-hidden text-center">
                                    <h3 className="text-amber-600 text-[9px] font-bold uppercase tracking-[0.3em] mb-4 font-altar">GLORĬA ET VICTŌRIA</h3>
                                    <p className="text-stone-300 font-serif italic text-base leading-relaxed uppercase">"VISUALIZA TU ASCENSO. LA CARPETA <span className="text-amber-500 underline font-bold">MARIANO FIT</span> ES EL TESTIMONIO DE TV GLORIA."</p>
                                    <a href="https://drive.google.com/drive/folders/1wxD5-44Rj8GVBSCHtKUBf5d12U4K3cOQ" target="_blank" className="inline-block mt-4 text-[9px] text-amber-600 uppercase border-b border-amber-600/20 font-bold tracking-widest transition-opacity hover:opacity-70">VIDERE TRIVMPHVM</a>
                                </div>
                                <div className="p-6 border border-red-950/30 bg-red-950/5 relative overflow-hidden text-center">
                                    <h3 className="text-red-900 text-[9px] font-bold uppercase tracking-[0.3em] mb-4 font-altar">MEMENTŌ MORĪ</h3>
                                    <p className="text-stone-400 font-serif italic text-base leading-relaxed uppercase">"RECUERDA LA CARPETA <span className="text-red-800 underline font-bold">MARIANO GORDO</span>. ES LA ADVERTENCIA DE LO QVE SUCEDE CUANDO NON HAY LEX."</p>
                                    <a href="https://drive.google.com/drive/folders/1wzkDMJnr8cfq36HvbRfRizRLzXdJWDWq" target="_blank" className="inline-block mt-4 text-[9px] text-red-900 uppercase border-b border-red-900/20 font-bold tracking-widest transition-opacity hover:opacity-70">VIDERE ABYSSVM</a>
                                </div>
                                <div className="pt-10 border-t border-stone-900 space-y-4">
                                    <h4 className="text-stone-600 text-[10px] font-bold uppercase tracking-widest text-center">CONSERVATIO PROGRESSVS</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={exportBackup} className="py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest hover:border-amber-600 transition-colors font-bold"><span>SERVARE EXEMPLAR</span></button>
                                        <button onClick={() => fileInputRef.current.click()} className="py-3 border border-stone-800 bg-stone-900/20 text-stone-400 text-[9px] uppercase tracking-widest hover:border-amber-600 transition-colors font-bold"><span>LEGERE EXEMPLAR</span></button>
                                        <input type="file" ref={fileInputRef} onChange={importBackup} className="hidden" accept=".json" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {isExFormOpen && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="w-full max-w-sm p-6 border border-amber-900/50 bg-stone-950 space-y-4 font-bold shadow-2xl shadow-black">
                                <h3 className="text-[10px] font-altar uppercase tracking-widest text-amber-600">{editingExIndex !== null ? "MVTARE EXERCITIVM" : "NOVVM EXERCITIVM"}</h3>
                                <input value={tempEx.name || ''} onChange={e => setTempEx({...tempEx, name: e.target.value.toUpperCase()})} placeholder="NOMEN EXERCITII" className="w-full bg-transparent border-b border-stone-800 p-2 text-sm italic outline-none focus:border-amber-600 uppercase text-stone-200" />
                                <div className="grid grid-cols-3 gap-2">{muscleList.map(m => (<button key={m.id} onClick={() => setTempEx({...tempEx, muscles: (tempEx.muscles || []).includes(m.id) ? (tempEx.muscles || []).filter(x => x !== m.id) : [...(tempEx.muscles || []), m.id]})} className={`text-[8px] p-2 border transition-all ${(tempEx.muscles || []).includes(m.id) ? 'border-amber-600 text-amber-500 bg-amber-950/20' : 'border-stone-800 text-stone-600'} uppercase tracking-widest font-bold`}>{m.label}</button>))}</div>
                                <div className="flex space-x-2">
                                    <div className="w-1/3"><label className="text-[8px] text-stone-600 uppercase block ml-2 font-bold mb-1">PONDVS (KG)</label><input type="number" value={tempEx.weight || ''} onChange={e => setTempEx({...tempEx, weight: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" /></div>
                                    <div className="w-1/3"><label className="text-[8px] text-stone-600 uppercase block ml-2 font-bold mb-1">SERIES</label><input type="number" value={tempEx.sets || ''} onChange={e => setTempEx({...tempEx, sets: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" /></div>
                                    <div className="w-1/3"><label className="text-[8px] text-stone-600 uppercase block ml-2 font-bold mb-1">REPETITIONES</label><input type="number" value={tempEx.reps || ''} onChange={e => setTempEx({...tempEx, reps: e.target.value})} className="w-full bg-transparent border-b border-stone-800 p-2 text-sm outline-none text-stone-200" /></div>
                                </div>
                                <button onClick={saveNewEx} className="w-full py-3 bg-amber-600 text-black font-altar text-[10px] tracking-widest uppercase font-bold transition-transform active:scale-95">CONSIGNARE</button>
                                <button onClick={() => { setIsExFormOpen(false); setEditingExIndex(null); }} className="w-full text-stone-600 text-[8px] uppercase tracking-widest mt-2 font-bold">ABROGARE</button>
                            </div>
                        </div>
                    )}

                    <button 
                        onClick={performUndo}
                        disabled={undoStack.length === 0}
                        className={`fixed bottom-2 right-2 z-[60] px-2 py-1 text-[8px] font-bold uppercase tracking-widest transition-all duration-500 rounded border border-amber-900/40 bg-stone-900/60 text-amber-600 hover:text-orange-400 hover:bg-stone-900 active:scale-90 ${undoStack.length > 0 ? 'opacity-50 hover:opacity-100' : 'opacity-0 pointer-events-none'}`}
                    >
                        REVERTERE ({undoStack.length})
                    </button>

                    <footer className="fixed bottom-0 w-full p-6 text-center bg-gradient-to-t from-black to-transparent pointer-events-none">
                        <div className="text-[8px] text-stone-800 uppercase tracking-[0.5em] font-bold font-altar">NON DVCOR, DVCO</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
