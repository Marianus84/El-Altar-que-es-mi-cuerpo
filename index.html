```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSMF Elite - Protocolo Mariano</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, doc, setDoc, onSnapshot, collection, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Datos del Protocolo
        const DAYS = [
            { id: 0, date: '2026-04-28', name: 'Martes', type: 'PSMF', label: 'Hoy', meal: "450g Pechuga de Pollo + Espinacas", desc: "Pechuga a la plancha con limón. Espinacas al vapor." },
            { id: 1, date: '2026-04-29', name: 'Miércoles', type: 'PSMF', label: 'Mañana', meal: "500g Pescado Blanco + Espárragos", desc: "Bacalao o Merluza al horno con especias." },
            { id: 2, date: '2026-04-30', name: 'Jueves', type: 'PSMF', label: 'Día 3', meal: "450g Pavo Magro + Calabacín", desc: "Salteado de pavo con calabacín y mucha cebolla." },
            { id: 3, date: '2026-05-01', name: 'Viernes', type: 'FREE', label: 'Refeed', meal: "ENTRAÑA / ASADO + CARBOS", desc: "Día libre controlado. Disfruta de cortes grasos." },
            { id: 4, date: '2026-05-02', name: 'Sábado', type: 'PSMF', label: 'Día 5', meal: "400g Peceto o Nalga + Ensalada", desc: "Carne de vaca extra magra sin grasa visible." },
            { id: 5, date: '2026-05-03', name: 'Domingo', type: 'FREE', label: 'Social', meal: "ASADO SOCIAL LIBRE", desc: "Prioriza proteína, permite flexibilidad social." },
            { id: 6, date: '2026-05-04', name: 'Lunes', type: 'PSMF', label: 'Día 7', meal: "500g Gambas o Atún Natural", desc: "Opción rápida y limpia de proteína pura." },
            { id: 7, date: '2026-05-05', name: 'Martes', type: 'PSMF', label: 'Día 8', meal: "12 Claras de Huevo + Pavo", desc: "Revuelto gigante de claras con pavo magro." },
            { id: 8, date: '2026-05-06', name: 'Miércoles', type: 'Final', meal: "Pescado Blanco + Pimientos", desc: "Último día de protocolo estricto." },
        ];

        const FOOD_LIST = [
            { cat: "Carnes Magras", items: ["Peceto", "Nalga", "Cuadril", "Lomo", "Pechuga Pollo/Pavo"] },
            { cat: "Pescados", items: ["Merluza", "Bacalao", "Atún Natural", "Gambas", "Pulpo"] },
            { cat: "Verduras", items: ["Espinacas", "Brócoli", "Espárragos", "Calabacín", "Pepino"] }
        ];

        function App() {
            const [view, setView] = useState('daily');
            const [selectedIdx, setSelectedIdx] = useState(0);
            const [progress, setProgress] = useState({});
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, collection, onSnapshot } = window.FirebaseSDK;
                
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const firestore = getFirestore(app);
                const auth = getAuth(app);
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'psmf-mariano-v6';

                setDb(firestore);

                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (currUser) => {
                    setUser(currUser);
                    if (currUser) {
                        const q = collection(firestore, 'artifacts', appId, 'users', currUser.uid, 'progress');
                        onSnapshot(q, (snapshot) => {
                            const data = {};
                            snapshot.forEach(doc => data[doc.id] = doc.data());
                            setProgress(data);
                        });
                    }
                });
            }, []);

            const updateData = async (key, val) => {
                if (!user || !db) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'psmf-mariano-v6';
                const date = DAYS[selectedIdx].date;
                const current = progress[date] || { water: 0, omad: false, protein: false, salts: false };
                
                const newData = key === 'water' ? { ...current, water: val } : { ...current, [key]: val };
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'progress', date), newData);
            };

            const day = DAYS[selectedIdx];
            const stats = progress[day.date] || { water: 0, omad: false, protein: false, salts: false };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/10">
                        <div>
                            <h1 className="text-2xl font-black italic text-orange-500 tracking-tighter uppercase">PSMF Elite</h1>
                            <p className="text-[10px] font-bold text-zinc-500 tracking-[0.3em]">MARIANO PROTOCOL</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('daily')} className={`p-2 rounded-xl ${view === 'daily' ? 'bg-orange-600' : 'bg-zinc-800'}`}><i data-lucide="calendar"></i></button>
                            <button onClick={() => setView('market')} className={`p-2 rounded-xl ${view === 'market' ? 'bg-orange-600' : 'bg-zinc-800'}`}><i data-lucide="shopping-cart"></i></button>
                        </div>
                    </header>

                    <main className="p-4 flex-grow space-y-6">
                        {view === 'daily' ? (
                            <>
                                {/* Selector Día */}
                                <div className="flex items-center justify-between glass p-4 rounded-3xl">
                                    <button onClick={() => setSelectedIdx(Math.max(0, selectedIdx - 1))} className="p-2 opacity-50"><i data-lucide="chevron-left"></i></button>
                                    <div className="text-center">
                                        <p className="text-[10px] font-black text-orange-500 uppercase">{day.label}</p>
                                        <h2 className="text-xl font-black italic">{day.name}</h2>
                                    </div>
                                    <button onClick={() => setSelectedIdx(Math.min(8, selectedIdx + 1))} className="p-2 opacity-50"><i data-lucide="chevron-right"></i></button>
                                </div>

                                {/* Menu Card */}
                                <div className={`p-8 rounded-[2.5rem] border-2 shadow-2xl ${day.type === 'FREE' ? 'bg-emerald-950/20 border-emerald-500/20' : 'bg-orange-950/20 border-orange-500/20'}`}>
                                    <span className="text-[10px] font-black uppercase opacity-50">Menú OMAD</span>
                                    <h3 className="text-3xl font-black italic uppercase leading-none my-3">{day.meal}</h3>
                                    <p className="text-sm text-zinc-400 leading-relaxed">{day.desc}</p>
                                </div>

                                {/* Trackers */}
                                <div className="space-y-2">
                                    <TrackerBtn label="Ayuno OMAD Completado" active={stats.omad} onClick={() => updateData('omad', !stats.omad)} />
                                    <TrackerBtn label="Proteína Magra Ingerida" active={stats.protein} onClick={() => updateData('protein', !stats.protein)} />
                                    <TrackerBtn label="Sales / Electrolitos" active={stats.salts} onClick={() => updateData('salts', !stats.salts)} />
                                </div>

                                {/* Agua */}
                                <div className="glass p-6 rounded-3xl">
                                    <div className="flex justify-between items-center mb-4 text-sky-400 font-black">
                                        <span className="text-xs uppercase">Hidratación</span>
                                        <span>{stats.water}/10</span>
                                    </div>
                                    <div className="flex gap-1 h-3">
                                        {[...Array(10)].map((_, i) => (
                                            <div key={i} onClick={() => updateData('water', i+1)} className={`flex-1 rounded-sm cursor-pointer ${i < stats.water ? 'bg-sky-500' : 'bg-zinc-800'}`}></div>
                                        ))}
                                    </div>
                                </div>

                                {/* Motivación */}
                                <a href="https://drive.google.com/drive/folders/1wzkDMJnr8cfq36HvbRfRizRLzXdJWDWq" target="_blank" className="block p-6 bg-red-600 rounded-3xl text-center shadow-xl shadow-red-600/20 active:scale-95 transition-all">
                                    <p className="text-[10px] font-black opacity-70 uppercase tracking-widest">¿Hambre? Mira tus fotos</p>
                                    <h4 className="text-lg font-black italic">MARIANO GORDO</h4>
                                </a>
                            </>
                        ) : (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-black italic uppercase italic">Lista de Compra</h2>
                                {FOOD_LIST.map((f, i) => (
                                    <div key={i} className="glass p-6 rounded-3xl space-y-3">
                                        <h4 className="font-black text-orange-500 uppercase text-xs">{f.cat}</h4>
                                        <div className="grid grid-cols-1 gap-2">
                                            {f.items.map((item, j) => (
                                                <div key={j} className="text-sm text-zinc-400 font-medium flex items-center gap-2">
                                                    <div className="w-1.5 h-1.5 bg-orange-600 rounded-full"></div>
                                                    {item}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <div className="p-6 bg-purple-900/20 border border-purple-500/20 rounded-3xl">
                                    <h4 className="font-black text-purple-400 uppercase text-xs mb-2">Sales Críticas</h4>
                                    <p className="text-[11px] text-zinc-400 italic">No olvides: Sal común, Sal Potásica (Sal Costa) y Magnesio. Sin esto, el OMAD te dará dolor de cabeza.</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Progress */}
                    <footer className="p-6 glass mt-auto border-t border-white/10">
                        <div className="flex justify-between items-center text-[10px] font-black uppercase mb-2">
                            <span className="text-zinc-500">Logro Semanal</span>
                            <span className="text-orange-500">{Math.round((Object.keys(progress).length / 9) * 100)}%</span>
                        </div>
                        <div className="h-1 bg-zinc-800 rounded-full overflow-hidden">
                            <div className="h-full bg-orange-600 shadow-[0_0_10px_rgba(234,88,12,0.5)] transition-all duration-700" style={{ width: `${(Object.keys(progress).length / 9) * 100}%` }}></div>
                        </div>
                    </footer>
                </div>
            );
        }

        function TrackerBtn({ label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center justify-between p-5 rounded-3xl border transition-all ${active ? 'bg-zinc-900 border-orange-500/30 text-white' : 'bg-black border-white/5 text-zinc-600'}`}>
                    <span className="font-black uppercase text-[10px] tracking-widest">{label}</span>
                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${active ? 'bg-orange-600 border-orange-600' : 'border-zinc-800'}`}>
                        {active && <i data-lucide="check" style={{width: 14, height: 14, color: 'white'}}></i>}
                    </div>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
