<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierre Sagrado | Protocolo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #09090b; color: #f4f4f5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .timer-progress { transition: width 1s linear; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RITUAL_STEPS = [
            { id: 'clean', title: 'Limpiar y Guardar', time: 60, icon: '✨' },
            { id: 'teeth', title: 'Higiene Dental', time: 60, icon: '🦷' },
            { id: 'water', title: 'Bebida Final', time: 60, icon: '🍵' },
            { id: 'lights', title: 'Apagar Cocina', time: 0, icon: '🌙' }
        ];

        const PHRASES = [
            "La disciplina es el puente entre metas y logros.",
            "Un cierre sagrado asegura un nuevo amanecer brillante.",
            "La constancia es la forma más elevada de amor propio.",
            "Cada día que completas, tu futuro se vuelve más fuerte.",
            "El dominio de la noche es el dominio de la vida.",
            "Mañana te agradecerás por haber cerrado bien el hoy."
        ];

        function App() {
            const [activeStep, setActiveStep] = useState(null);
            const [completed, setCompleted] = useState([]);
            const [timeLeft, setTimeLeft] = useState(0);
            const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('streak') || '0'));

            useEffect(() => {
                if (timeLeft > 0) {
                    const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                    return () => clearInterval(timer);
                } else if (timeLeft === 0 && activeStep !== null) {
                    if (!completed.includes(activeStep)) {
                        setCompleted([...completed, activeStep]);
                    }
                    setActiveStep(null);
                }
            }, [timeLeft, activeStep]);

            const finishProtocol = () => {
                const newStreak = streak + 1;
                setStreak(newStreak);
                localStorage.setItem('streak', newStreak);
                setCompleted([]);
            };

            const startStep = (step) => {
                if (completed.includes(step.id) || activeStep === step.id) return;
                if (step.time > 0) {
                    setTimeLeft(step.time);
                    setActiveStep(step.id);
                } else {
                    setCompleted([...completed, step.id]);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col justify-center">
                    <div className="text-center mb-8">
                        <div className="inline-block px-4 py-1 rounded-full glass mb-4 text-xs font-bold tracking-widest text-indigo-400">
                            RACHA: {streak} DÍAS
                        </div>
                        <h1 className="text-4xl font-black italic tracking-tighter text-indigo-500 uppercase">Cierre Sagrado</h1>
                        <p className="text-zinc-500 font-light mt-2 uppercase tracking-[0.2em] text-xs">
                            {PHRASES[streak % PHRASES.length]}
                        </p>
                    </div>

                    <div className="space-y-4">
                        {RITUAL_STEPS.map((step) => {
                            const isDone = completed.includes(step.id);
                            const isActive = activeStep === step.id;
                            const progress = isActive ? ((step.time - timeLeft) / step.time) * 100 : 0;

                            return (
                                <div key={step.id} 
                                    onClick={() => startStep(step)}
                                    className={`relative overflow-hidden glass p-6 rounded-3xl transition-all duration-500 cursor-pointer
                                    ${isDone ? 'border-emerald-500/50 bg-emerald-950/20' : isActive ? 'border-indigo-500 glow' : 'border-white/10 hover:border-white/20'}`}>
                                    
                                    {isActive && (
                                        <div className="absolute bottom-0 left-0 h-1 bg-indigo-500 timer-progress" style={{ width: `${progress}%` }}></div>
                                    )}

                                    <div className="flex items-center gap-4 relative z-10">
                                        <div className="text-2xl">{isDone ? '✅' : step.icon}</div>
                                        <div>
                                            <h3 className="font-bold text-lg">{step.title}</h3>
                                            <p className="text-xs text-zinc-400">
                                                {isActive ? `${timeLeft}s restantes...` : isDone ? 'Completado' : step.time > 0 ? `Requiere ${step.time}s` : 'Acción instantánea'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {completed.length === RITUAL_STEPS.length && (
                        <div className="mt-10 animate-pulse">
                            <button onClick={finishProtocol} className="w-full py-6 rounded-3xl bg-indigo-600 font-black text-xl italic uppercase tracking-widest shadow-2xl shadow-indigo-600/50 hover:bg-indigo-500 transition-all">
                                Día Cerrado
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
